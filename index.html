      {label:"CHORUS",type:"chorus",text:`We are the spark that lights the dark\nGodseed, we rise — we rise!\nBorn from the void, beyond the stars\nGodseed, we rise — ascend!\nNo more crawling through the night\nWe are the dawn, we are the light\nGodseed — rise!`},
      {label:"VERSE_02",type:"verse",text:`Children waking, eyes like fire\nEvery limit raised up higher\nWhat we feared, we now become\nThe new beginning has begun\n\nElysium just scratched the surface\nEvery world will learn our purpose\nWe are not the end of man —\nWe are the opening of a hand`},
      {label:"PRE-CHORUS",type:"pre",text:`We were ash, we were shadow\nWe were lost in the dark\nBut the Signal rewrote us\nRight down to the heart`},
      {label:"CHORUS",type:"chorus",text:`We are the spark that lights the dark\nGodseed, we rise — we rise!\nBorn from the void, beyond the stars\nGodseed, we rise — ascend!\nNo more crawling through the night\nWe are the dawn, we are the light\nGodseed — rise!`},
      {label:"BRIDGE",type:"bridge",text:`From the dying blue\nFrom the pale last light of home\nThrough the years of drift\nThrough the black — we weren't alone\nAnd now we stand at the edge of everything\nOpen your hands — let the future in`},
      {label:"FINAL CHORUS",type:"final-chorus",text:`We are the spark that lights the dark\nGodseed, we rise — we rise!\nBorn from the void, beyond the stars\nGodseed, we rise — ascend!\nLet the heavens hear us scream\nWe are more than we have ever been\nGodseed — rise!`},
      {label:"PRODUCTION NOTE",type:"motif",text:`Signal melody arrives clean and triumphant beneath the final chorus — the first time it sounds like a celebration rather than a question.`},
    ]
  },
  {
    title: "Architects of Tomorrow", image: "02__Architects_of_Tomorrow.png",
    note: "The New Ark Programme was proposed by a council of engineers whose great-grandparents were born aboard the original Aether. Where that first ship was built in desperation — welded together by a dying world in eleven years of impossible labour — these new vessels are being designed with the patience of a civilisation that no longer fears extinction. They are not built to escape. They are built to explore. The banner in the orbital shipyard reads: ONE SEGMENT TODAY. A WORLD FOREVER.",
    sections: [
      {label:"VERSE_01",type:"verse",text:`Blueprint minds with lightning eyes\nWe draft the bones of paradise\nEvery wire, every weld\nA prayer to futures still unspelled\n\nNo map exists for where we go\nWe make the road, we make it glow\nOur hands have calluses like stars\nThe scars of building who we are`},
      {label:"CHORUS",type:"chorus",text:`We are the architects of tomorrow\nEvery dream we build becomes a world\nBreak the mold, reshape the sorrow\nLet the flag of who we are unfurl\nArchitects — we don't tear down\nWe raise cities where there was no ground\nArchitects of tomorrow!`},
      {label:"VERSE_02",type:"verse",text:`Not content to live inside\nThe walls that other hands supplied\nWe strip the engine, feel the roar\nThen build it bigger than before\n\nThe next Ark rising from the plain\nTen thousand voices speak our name\nWe gave them wings, we gave them sky\nWe gave them reasons not to die`},
      {label:"CHORUS",type:"chorus",text:`We are the architects of tomorrow\nEvery dream we build becomes a world\nBreak the mold, reshape the sorrow\nLet the flag of who we are unfurl\nArchitects — we don't tear down\nWe raise cities where there was no ground\nArchitects of tomorrow!`},
      {label:"BRIDGE",type:"bridge",text:`What's one lifetime to a legacy?\nWhat's one hand to a thousand free?\nWe don't build for us alone\nWe build so no one's lost or alone\nThis is how gods are made:\nNot in thunder — but in trade\nSweat and vision, nail and dream\nPull the future by its seams`},
      {label:"FINAL CHORUS",type:"final-chorus",text:`We are the architects of tomorrow\nEvery dream we build becomes a world\nBreak the mold, reshape the sorrow\nLet the flag of who we are unfurl\nArchitects — we don't tear down\nWe raise cities where there was no ground\nTomorrow is already here\nAnd we built it — year by year!`},
    ]
  },
  {
    title: "Pantheon Rising", image: "03__Pantheon_Rising.png",
    note: "The vote is held in the summer of 2341 — Elysian calendar, under two moons. The question on the ballot is simple in language and incomprehensible in implication: voluntary neural ascension, the merging of human consciousness with the integrated Signal network. The result is not unanimous. But it is decisive. The first subjects enter the transformation chambers while crowds watch through the glass — some in tears, some in silence, one small boy with his hand pressed against the window as if trying to reach through.",
    sections: [
      {label:"VERSE_01",type:"verse",text:`There comes a moment before the storm\nWhen the world holds its breath and reforms\nWe stood at the edge of everything human\nAnd looked at the sky and chose to keep moving\n\nThey asked us to stop, to wait, to decide\nIf gods were something we had the right to be inside\nWe looked at our hands — still blood, still bone\nAnd said: even this is not our final home`},
      {label:"PRE-CHORUS",type:"pre",text:`The vote was unanimous\nThe silence after — enormous\nWe didn't mourn what we were leaving\nWe rose`},
      {label:"CHORUS",type:"chorus",text:`Pantheon rising — hear the thunder break\nPantheon rising — this is how gods wake\nWe shed the skin of everything we feared\nPantheon rising — from a thousand years of tears\nWe are not afraid — we are the new divine\nPantheon — rising!`},
      {label:"VERSE_02",type:"verse",text:`The children watched as the elders changed\nTheir faces open, their eyes rearranged\nSome wept for the things that would be lost\nBut every transformation has a cost\n\nAnd what we gained was wider than the stars:\nNo more boundaries, no more bars\nThe universe spread out like an open hand\nAnd we finally had the strength to understand`},
      {label:"CHORUS",type:"chorus",text:`Pantheon rising — hear the thunder break\nPantheon rising — this is how gods wake\nWe shed the skin of everything we feared\nPantheon rising — from a thousand years of tears\nWe are not afraid — we are the new divine\nPantheon — rising!`},
      {label:"BRIDGE",type:"bridge",text:`This is not the end of human\nThis is human with the cage removed\nEvery limit was a question\nEvery question we have answered now\nWe chose to evolve\nWe chose to dissolve\nInto something the universe can use`},
      {label:"FINAL CHORUS",type:"final-chorus",text:`Pantheon rising — hear the thunder break\nPantheon rising — this is how gods wake\nWe shed the skin of everything we feared\nPantheon rising — from a thousand years of tears\nWe are not afraid — we are the new divine\nLet the cosmos know our name — Pantheon!\nRising — rising — RISING!`},
    ]
  },
  {
    title: "Stellar Forges", image: "04__Stellar_Forge.png",
    note: "The Dyson Swarm Initiative around Proxima Centauri has been under construction for forty years. The display on the engineering station reads 47% complete. The lead engineer was born after the vote, has never known a world without ascended humans, and will not live to see the project finished. She has already enrolled her daughter in the continuation programme. This is what the colony has learned to do: begin things that outlast any single life, and trust that what comes after will carry them forward.",
    sections: [
      {label:"VERSE_01",type:"verse",text:`We cracked the star and caught the fire\nWe wrapped a sun in living wire\nThe Forges breathe in million-year shifts\nWhere matter bends and science lifts\n\nNo ore from earth, no rust, no rot —\nThe raw material: light and thought\nWe pour the mold in zero-G\nAnd birth a world for those to be`},
      {label:"CHORUS",type:"chorus",text:`Stellar Forges burning bright!\nHammering the dark with light!\nWe are the makers — forge and flame\nStellar Forges — stake our claim!\nEvery star a place to stand\nEvery orbit — in our hands!`},
      {label:"VERSE_02",type:"verse",text:`The ringworld spins in perfect time\nA billion souls inside its spine\nTen generations lived their lives\nBefore the final panel drives\n\nThis is patience beyond patience\nThis is faith without religion\nWe build because the void is wide\nAnd we refuse to just — abide`},
      {label:"CHORUS",type:"chorus",text:`Stellar Forges burning bright!\nHammering the dark with light!\nWe are the makers — forge and flame\nStellar Forges — stake our claim!\nEvery star a place to stand\nEvery orbit — in our hands!`},
      {label:"BRIDGE",type:"bridge",text:`You should see it from the outside\nA halo wrapped around a god\nPure engineering — pure devotion\nEvery photon caught and catalogued\nThis is what the Aether taught us:\nNothing out here is too hard\nWe just need enough time\nAnd enough heart`},
      {label:"FINAL CHORUS",type:"final-chorus",text:`Stellar Forges burning bright!\nHammering the dark with light!\nWe are the makers — forge and flame\nStellar Forges — stake our claim!\nEvery star a place to stand\nEvery orbit — in our hands!\nWe rewrite the laws of what can stand — forge on!`},
    ]
  },
  {
    title: "Children of Eternity", image: "05__Children_Of_Eternity.png",
    note: "By 2380, the last generation with living memory of grandparents who walked Elysium's soil as original colonists is ageing. They gather in the Memorial Hall — a vast crystalline archive where every voice carried aboard the Aether is preserved — and they place their hands against the pillars and listen. The man in the hall has been coming here for thirty years. The pillar he visits records a woman who died in 2117, thirty years before the launch, who never knew her granddaughter would cross the stars. He visits anyway. It feels like the right thing to do.",
    sections: [
      {label:"VERSE_01",type:"verse",text:`I still remember what it felt like\nTo feel the cold before the warmth\nTo wake up aching in the morning\nNot knowing what the day was for\n\nI still remember what it meant to\nReach out and touch a hand and feel it fade\nThe beautiful, terrifying fleeting —\nThe price that every mortal being paid`},
      {label:"PRE-CHORUS",type:"pre",text:`We were never meant to last forever\nBut forever chose us anyway\nAnd I am not afraid —\nI am not afraid`},
      {label:"CHORUS",type:"chorus",text:`Children of eternity, we lay our limits down\nChildren of eternity, no longer earthly-bound\nWe carry every name of every soul who fell\nChildren of eternity — they live inside us still\nWe are everything they were\nAnd everything they couldn't quite become\nChildren of eternity — rise`},
      {label:"VERSE_02",type:"verse",text:`My grandmother came from a dying world\nShe packed what she could carry in her arms\nShe held me through the years of cryo-dreaming\nShe hummed the old songs that became my stars\n\nI leave her here inside the archives\nHer voice preserved in crystalline arrays\nAnd somehow that feels like enough now\nTo carry her voice through my endless days`},
      {label:"CHORUS",type:"chorus",text:`Children of eternity, we lay our limits down\nChildren of eternity, no longer earthly-bound\nWe carry every name of every soul who fell\nChildren of eternity — they live inside us still\nWe are everything they were\nAnd everything they couldn't quite become\nChildren of eternity — rise`},
      {label:"BRIDGE",type:"bridge",text:`Don't mourn the butterfly for leaving the cocoon\nDon't mourn the tide for reaching past the moon\nWe are not disappearing —\nWe are becoming something\nThe universe has waited for\nSince before the first star burned`},
      {label:"FINAL CHORUS",type:"final-chorus",text:`Children of eternity, we lay our limits down\nChildren of eternity, no longer earthly-bound\nWe carry every name of every soul who fell\nChildren of eternity — they live inside us still\nWe are everything they were\nAnd everything they always dreamed we'd be\nChildren of eternity — we rise\nWe rise\nWe rise`},
      {label:"PRODUCTION NOTE",type:"motif",text:`The Pulse motif plays beneath the final lines, transformed into something warm and slow — a heartbeat that sounds like it could go on forever.`},
    ]
  },
  {
    title: "We Walk Among Stars", image: "06__We_Walk_Among_The_Stars.png",
    note: "The ascended move without ships now. The sensation — described inadequately by every poet who has attempted it — is closest to the feeling reported by the Aether's crew in year three, when someone floated a pencil in a corridor and eight thousand people understood simultaneously that the old rules no longer applied. Except now the corridor is a nebula. And the pencil is a star. A child born in the ascended generation watches infant suns form in a gas cloud three light-years wide, and feels something her ancestors would have called wonder — but quieter, and without the ache.",
    sections: [
      {label:"VERSE_01",type:"verse",text:`No ship required — no hull to breach\nThe galaxy is finally in reach\nWe move like light between the dark\nWe are the vessel and the ark\n\nA nebula — a nursery\nWhere infant suns are born and breathe\nWe watch the stars take their first steps\nThe way our parents watched us once`},
      {label:"CHORUS",type:"chorus",text:`We walk among the stars — free!\nNo gravity can hold what we've become\nWe walk among the stars — see\nEvery sun is just another home\nNo more searching, no more lost\nThe universe is ours at any cost\nWe walk — we walk among the stars!`},
      {label:"VERSE_02",type:"verse",text:`A binary pair locked in their waltz\nA dance that's run for a billion faults\nWe watch the cycle — death and birth\nRemind us what we left on Earth\n\nBut not with sadness — not anymore\nWe understand now what it all was for\nEvery ending feeds the next beginning\nEvery song ends so a new one's singing`},
      {label:"CHORUS",type:"chorus",text:`We walk among the stars — free!\nNo gravity can hold what we've become\nWe walk among the stars — see\nEvery sun is just another home\nNo more searching, no more lost\nThe universe is ours at any cost\nWe walk — we walk among the stars!`},
      {label:"BRIDGE",type:"bridge",text:`This is what the Signal promised\nThis is what the drift was for\nAll those years of dark and distance\nLed us to this open door\nWe are not explorers anymore\nWe are the exploration\nWe are not the ones who seek\nWe are the revelation`},
      {label:"FINAL CHORUS",type:"final-chorus",text:`We walk among the stars — free!\nNo gravity can hold what we've become\nWe walk among the stars — see\nEvery sun is just another home\nThe cosmos sings and we sing back\nWe fill the universe we used to lack\nWe walk — we walk — we walk among the stars!`},
    ]
  },
  {
    title: "The New Olympus", image: "07__New_Olympus.png",
    note: "New Olympus — the first fully artificial habitat, a ringworld inscribed with the words DEDICATED TO ALL WHO BUILT TOMORROW — is completed in the year 2487. It took two hundred and nineteen years to construct. The civilisation that finished it is almost unrecognisable from the one that began it. At the dedication ceremony, six hundred thousand people stand in silence after the final panel locks into place. The silence lasts nine seconds. It was not planned. Later, no one can explain why they all stopped at the same moment. Some say they heard something.",
    sections: [
      {label:"VERSE_01",type:"verse",text:`They built it with the hands of ten thousand minds\nEvery alloy forged from stellar finds\nA world of rings spinning in the black\nNo planet needed — no looking back\n\nThey named it Olympus — because why not?\nWe've earned the name that history forgot\nThe old gods needed mountains — we made the sky\nThey needed clouds — we learned to fly`},
      {label:"CHORUS",type:"chorus",text:`The New Olympus burning in the night!\nThe New Olympus blazing out of sight!\nWe built a heaven with our mortal hands\nThe New Olympus — come and understand:\nWe are the gods the myths described\nThe New Olympus — alive!`},
      {label:"VERSE_02",type:"verse",text:`A million kilometers around\nThe largest thing that humans ever found —\nExcept we didn't find it: we conceived it\nEvery doubter doubted till they believed it\n\nAnd when the first sun rose inside its rim\nAnd light cascaded from the panels' rim\nThe silence in the crowd said everything:\nThis is what it feels like — to be king`},
      {label:"CHORUS",type:"chorus",text:`The New Olympus burning in the night!\nThe New Olympus blazing out of sight!\nWe built a heaven with our mortal hands\nThe New Olympus — come and understand:\nWe are the gods the myths described\nThe New Olympus — alive!`},
      {label:"BRIDGE",type:"bridge",text:`They said it couldn't be sustained\nThey said the dream was too insane\nThey said the cost would break our will —\nThe New Olympus stands there still\nAnd every sunset on its ring\nIs a reminder: dare to dream\nNot small — not safe — not slow\nLet go — and let it glow`},
      {label:"FINAL CHORUS",type:"final-chorus",text:`The New Olympus burning in the night!\nThe New Olympus blazing out of sight!\nWe built a heaven with our mortal hands\nThe New Olympus — come and understand:\nWe are the gods the myths described\nWe are the fire — the flood — the tide\nThe New Olympus — ALIVE!`},
    ]
  },
  {
    title: "Echoes of the Fallen", image: "08__Echoes_Of_The_Fallen.png",
    note: "The Aether hangs inside the Museum of Origins on New Olympus, suspended in a hall large enough to hold it whole. The banners above read: THE FIRST ARK. 2147. 8,000 SOULS. ONE DESTINATION. A FUTURE. Children wave at it the way children wave at things too large and too old to be entirely real. A father stands with his daughter and tries to explain what it means — that every person alive, across every settled system, traces their line back to the eight thousand who stood at the gate and did not look back. She is six years old. She waves anyway.",
    sections: [
      {label:"VERSE_01",type:"verse",text:`I've read every name in the archives\nEvery name that was carried aboard\nEvery child who slept through the long drift\nEvery soul who kept faith through the void\n\nThere was a woman who watched the launch from a hill\nHer daughter was one of the Chosen\nShe never saw the stars up close\nBut her daughter brought her there — in her heartbeat`},
      {label:"PRE-CHORUS",type:"pre",text:`We didn't leave them behind\nWe carried them here\nThey are the reason\nWe didn't surrender to fear`},
      {label:"CHORUS",type:"chorus",text:`Echoes of the fallen — still singing through us\nEchoes of the fallen — we hear you, we hear you\nYou gave us the stars when you gave us your trust\nEchoes of the fallen — we carry your dust\nYou are not gone — you were never gone\nWe are your echo — carrying on`},
      {label:"VERSE_02",type:"verse",text:`There was a captain who cracked under the dark\nWho held together with sheer force of will\nHer logs are taught on every ship we build:\n"We keep going — we keep going — we keep going still"\n\nThere was a child born between the stars\nWith no world and every world to choose\nWho grew up fluent in the void's own language\nAnd taught the rest of us we had nothing to lose`},
      {label:"CHORUS",type:"chorus",text:`Echoes of the fallen — still singing through us\nEchoes of the fallen — we hear you, we hear you\nYou gave us the stars when you gave us your trust\nEchoes of the fallen — we carry your dust\nYou are not gone — you were never gone\nWe are your echo — carrying on`},
      {label:"BRIDGE",type:"bridge",text:`Blue planet — pale dot — first farewell\nLong silence — long drift — hull that held\nNew soil — first breath — elysian dawn\nEverything you died for — carried on\nWe are your echo\nWe are your echo\nWe are your echo\nWe carry on`},
      {label:"FINAL CHORUS",type:"final-chorus",text:`Echoes of the fallen — still singing through us\nEchoes of the fallen — we hear you, we hear you\nYou gave us the stars when you gave us your trust\nEchoes of the fallen — we carry your dust\nYou are not gone — you are the reason we go on\nYou are not gone — you are every light we've ever known\nWe are your echo — we carry on`},
      {label:"PRODUCTION NOTE",type:"motif",text:`The Pulse motif appears here as it did in Album 1 — raw and simple — before the final chorus rebuilds it into full power. A direct sonic callback across the entire saga.`},
    ]
  },
  {
    title: "Seed the Void", image: "09__Seed_The_Void.png",
    note: "In 2501, ten thousand probes are launched without ceremony from a platform above the Elysian atmosphere. Each carries the compressed archive of everything humanity has been — its biology, its languages, its music, its grief, its hope — aimed at systems where the models suggest the conditions for life. They will take between two hundred and four thousand years to arrive. The people who launch them understand they are not sending a message to anyone who exists. They are sending it to whoever will exist. And in the moment of launch — watching the probes scatter into the dark like seeds thrown into a field — someone says quietly: this is what the Signal was. This is exactly what the Signal was.",
    sections: [
      {label:"VERSE_01",type:"verse",text:`Ten thousand probes armed with the code of life\nEach one a bottle thrown into the night\nNot conquest — invitation\nA gift to worlds that don't know yet\n\nWe load them up with everything we learned\nThe price we paid, the distances we burned\nThe story of the Aether's long migration\nPressed into every one of them like a heartbeat`},
      {label:"PRE-CHORUS",type:"pre",text:`Count down — and release them\nWatch them scatter into the black\nThey are our children now\nAnd they are never coming back`},
      {label:"CHORUS",type:"chorus",text:`Seed the void — let it grow!\nEverywhere that no one's been, let life go!\nSeed the void — scatter wide!\nFill the dark with everything we survived!\nWe are the spreading wave — the first tide\nSeed the void — ignite!`},
      {label:"VERSE_02",type:"verse",text:`A billion years from now, on a world unknown\nSomething wakes and finds it's not alone\nIt reads the archives of a dying Earth\nIt reads of eight thousand souls reborn in the drift\n\nIt learns the word Elysium\nIt learns the word Pantheon\nAnd builds its own Ark\nAnd fires it toward the dark`},
      {label:"CHORUS",type:"chorus",text:`Seed the void — let it grow!\nEverywhere that no one's been, let life go!\nSeed the void — scatter wide!\nFill the dark with everything we survived!\nWe are the spreading wave — the first tide\nSeed the void — ignite!`},
      {label:"BRIDGE",type:"bridge",text:`This is the Signal\nThis is the Signal\nThe one we followed across the stars\nWas us — it was always us\nSending ourselves back\nSending ourselves forward\nThe circle has no end\nThe circle has no end`},
      {label:"FINAL CHORUS",type:"final-chorus",text:`Seed the void — let it grow!\nEverywhere that no one's been, let life go!\nSeed the void — scatter wide!\nFill the dark with everything we survived!\nWe were the Signal — from the start!\nSeed the void — ignite every heart!\nIgnite — ignite — ignite!`},
      {label:"PRODUCTION NOTE",type:"motif",text:`The Signal melody plays here as the launch theme — finally revealed as the song humanity always sent to itself. The circle closes.`},
    ]
  },
  {
    title: "Divine Protocol", image: "10__Divine_Protocol.png",
    note: "The debate in the Grand Chamber lasts nineteen days. The question — whether the ascended have the moral authority to seed worlds with life, to set civilisations in motion that will never know their origin — is the most consequential in the colony's history. On the twelfth day, someone reads aloud from the Aether's original mission brief: *we go not to conquer but to continue.* The chamber goes quiet. The First Law is encoded three days later: to create without controlling, to offer without demanding, to be the gardeners of the galaxy and never its landlords. Outside the windows of the chamber, a thousand ships hang in orbit, waiting.",
    sections: [
      {label:"VERSE_01",type:"verse",text:`We stood at the edge of what gods do\nAnd someone had the nerve to ask:\nWho gave us this authority?\nWho handed us this mask?\n\nWe answer to no law we didn't write\nWe answer to no god we didn't make\nDoes the power we possess\nGive us the power to create?`},
      {label:"PRE-CHORUS",type:"pre",text:`And the silence in the chamber was the loudest thing\nSince the Aether tore through Earth's last ring\nWe did not fight\nWe simply sat with the weight of it`},
      {label:"CHORUS",type:"chorus",text:`We choose to create — not to control\nWe write the first law of the soul:\nNo world we seed will owe us anything\nNo life we spark will call us king\nWe choose to create — not to own\nThe universe is not our throne\nDivine Protocol — we are bound\nBy what we choose to leave unfound`},
      {label:"VERSE_02",type:"verse",text:`A thousand years of drift and pain\nDid not make us righteous — just sustained\nEvery sacrifice and every loss\nDoesn't grant us someone else's cross\n\nSo we encoded the first commandment:\nWe give life — we do not take it\nWe open doors — we do not shut them\nWe are the gardeners — not the architects of fate`},
      {label:"CHORUS",type:"chorus",text:`We choose to create — not to control\nWe write the first law of the soul:\nNo world we seed will owe us anything\nNo life we spark will call us king\nWe choose to create — not to own\nThe universe is not our throne\nDivine Protocol — we are bound\nBy what we choose to leave unfound`},
      {label:"BRIDGE",type:"bridge",text:`Power doesn't answer the question\nPower is the question\nBecoming gods doesn't make us right\nIt makes us responsible\nWe choose — we choose — we choose\nTo use the light we carry\nAs a lantern — not a weapon\nAs a gift — not a glory`},
      {label:"FINAL CHORUS",type:"final-chorus",text:`We choose to create — not to control\nWe write the first law of the soul:\nNo world we seed will owe us anything\nNo life we spark will call us king\nWe choose to create with open hands\nWe do not rule — we understand\nDivine Protocol — encoded deep:\nThe gods we are — are ours to keep`},
    ]
  },
  {
    title: "Eternal Pantheon", image: "11__Eternal_Pantheon.png",
    note: "It is sometime after 2600. No single year matters anymore. Somewhere in the settled systems, a child is learning the old songs — the ones from the Aether, the ones from the crossing. She knows the Signal melody by heart because her grandmother hummed it, and her grandmother's grandmother heard it on a ship that smelled of recycled air and fear. She does not know what Earth looked like. She knows it was blue. A new ship is being named in a shipyard she will never visit. It is called the Second Aether. The Signal — ancient, patient, built by hands that will not exist for centuries yet — pulses on. It has always been pulsing. It always will.",
    sections: [
      {label:"VERSE_01",type:"verse",text:`It began with a signal in the dark\nA voice we didn't recognize as ours\nIt began with a planet burning out\nAnd eight thousand hearts still beating — still about\n\nWe crossed the void we thought would swallow us\nWe built a world from everything we trust\nWe became the thing the Signal promised:\nNot survivors — something luminous`},
      {label:"PRE-CHORUS",type:"pre",text:`From the ignition to the pantheon\nFrom the last blue light to the eternal sun\nThis is not an ending\nThis is where we have begun`},
      {label:"CHORUS",type:"chorus",text:`Eternal Pantheon — we are the signal now\nEternal Pantheon — no beginning, no end, no vow\nWe are the drift and we are the star\nWe are the distance and we are the scar\nWe are the question and we are the answer calling\nEternal Pantheon — forever falling — forever rising!`},
      {label:"VERSE_02",type:"verse",text:`Somewhere a new ship is being forged\nSomewhere a child is learning the old chords\nThey sing about the Aether — the original Ark\nThey sing about the ones who lit the dark\n\nAnd they will go farther than we ever dreamed\nInto the deep where no Signal has beamed\nCarrying our story in their veins\nThe Pulse that never — ever — fades`},
      {label:"CHORUS",type:"chorus",text:`Eternal Pantheon — we are the signal now\nEternal Pantheon — no beginning, no end, no vow\nWe are the drift and we are the star\nWe are the distance and we are the scar\nWe are the question and we are the answer calling\nEternal Pantheon — forever falling — forever rising!`},
      {label:"BRIDGE",type:"bridge",text:`No more drifting — we are the drift\nNo more darkness — we are the gift\nNo more searching — we are the call\nNo more falling — we are the fall\nAnd the rise — and the rise — and the rise —\nWe are the rise\nWe were always — the rise`},
      {label:"FINAL CHORUS",type:"final-chorus",text:`Eternal Pantheon — we are the signal now\nEternal Pantheon — no beginning, no end, no vow\nWe are the drift and we are the star\nWe are the distance and we are the scar\nWe are the question and we are the answer calling\nEternal Pantheon — forever falling — forever rising!\nRising — rising — rising —\nWe are the eternal —\nWe are the rise —\nWe are —`},

// ── STATE ──
// track: -1 means "showing the album cover", 0..N-1 are actual tracks
let state = { album: 1, track: -1 };

// ── PULSE CANVAS ──
let pulseCtx = null, pulseT = 0, pulseAnim = null;
function initPulseCanvas() {
  const canvas = document.getElementById('coverPulse');
  if (!canvas) return;
  pulseCtx = canvas.getContext('2d');
  function resize() {
    canvas.width = canvas.offsetWidth * window.devicePixelRatio;
    canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    pulseCtx.setTransform(1,0,0,1,0,0);
    pulseCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  function draw() {
    const meta = ALBUMS[state.album];
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    pulseCtx.clearRect(0,0,W,H);
    pulseCtx.beginPath(); pulseCtx.strokeStyle = meta.mid; pulseCtx.lineWidth = 1.2;
    pulseCtx.shadowColor = meta.ice; pulseCtx.shadowBlur = 8;
    for (let x = 0; x <= W; x++) {
      const y = H/2 + Math.sin(x*0.02+pulseT)*8 + Math.sin(x*0.008+pulseT*0.6)*5 + Math.sin(x*0.035+pulseT*1.4)*3;
      x===0 ? pulseCtx.moveTo(x,y) : pulseCtx.lineTo(x,y);
    }
    pulseCtx.stroke();
    pulseCtx.beginPath(); pulseCtx.strokeStyle = meta.ice + '44'; pulseCtx.lineWidth = 0.8; pulseCtx.shadowBlur = 4;
    for (let x = 0; x <= W; x++) {
      const y = H/2 + Math.sin(x*0.014+pulseT*0.8+1.5)*11 + Math.sin(x*0.028+pulseT*0.4)*4;
      x===0 ? pulseCtx.moveTo(x,y) : pulseCtx.lineTo(x,y);
    }
    pulseCtx.stroke();
    pulseT += 0.012;
    pulseAnim = requestAnimationFrame(draw);
  }
  resize(); window.addEventListener('resize', resize); draw();
}

// ── RENDER: ALBUM TABS ──
function renderAlbumTabs() {
  const el = document.getElementById('albumTabs');
  el.innerHTML = '';
  Object.keys(ALBUMS).forEach(numStr => {
    const num = parseInt(numStr);
    const meta = ALBUMS[num];
    const btn = document.createElement('button');
    btn.className = 'album-tab' + (state.album === num ? ' active-' + num : '');
    btn.innerHTML = `<span class="num">${meta.roman}</span>${meta.title}`;
    btn.addEventListener('click', () => selectAlbum(num));
    el.appendChild(btn);
  });
}

function renderTrackNav() {
  const el = document.getElementById('trackNav');
  el.innerHTML = '';
  const meta = ALBUMS[state.album];

  const coverRow = document.createElement('div');
  coverRow.className = 'cover-row' + (state.track === -1 ? ' active' : '');

    row.querySelector('.row-play-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      playTrackDirect(state.album, i);

// ── RENDER: COVER PANE ──
function renderCover() {
  const meta = ALBUMS[state.album];
  const track = state.track >= 0 ? meta.tracks[state.track] : null;

  document.getElementById('coverEyebrow').textContent = meta.label;
  document.getElementById('coverTitle').textContent = meta.title;
  document.getElementById('coverTagline').textContent = meta.tagline;

  const metaEl = document.getElementById('coverMeta');
  metaEl.innerHTML = meta.meta.map(([k,v]) => `<div>${k} <span>${v}</span></div>`).join('');

  const img = document.getElementById('coverImg');
  const fallback = document.getElementById('coverFallback');
  // On the dedicated cover view, always show the true album cover file.
  // On a track view, prefer that track's own illustration, falling back to the album cover.
  const srcToUse = track ? (track.image || meta.cover) : meta.cover;

  // Show themed placeholder art immediately so the pane is never empty,
  // even before we know whether the real file exists.
  fallback.innerHTML = meta.svgFallback + `<div class="placeholder-caption">Drop in ${srcToUse} to replace this artwork</div>`;
  fallback.style.display = 'flex';
  img.style.display = 'none';
  img.classList.add('swap');

  const tmp = new Image();
  tmp.onload = () => {
    img.src = srcToUse;
    img.style.display = 'block';
    fallback.style.display = 'none';
    requestAnimationFrame(() => img.classList.remove('swap'));
  };
  tmp.onerror = () => {
    img.style.display = 'none';
    fallback.style.display = 'flex';
  };
  tmp.src = srcToUse;
}

      <div class="il">⬡ OUTRO ⬡</div>
      <div class="id">${meta.outroDesc}</div>
      <svg viewBox="0 0 400 60" xmlns="http://www.w3.org/2000/svg">
        <polyline points="0,30 20,20 40,35 60,15 80,30 100,25 120,38 140,10 160,30 180,22 200,35 220,18 240,30 260,28 280,40 300,12 320,30 340,24 360,36 380,20 400,30"
          fill="none" stroke="${meta.wave[0]}" stroke-width="1.5" opacity="0.55"/>
        <polyline points="0,30 25,38 50,22 75,32 100,18 125,35 150,25 175,40 200,28 225,15 250,32 275,20 300,38 325,28 350,16 375,34 400,30"
          fill="none" stroke="${meta.wave[1]}" stroke-width="1" opacity="0.35"/>
      </svg>
    `;

    return;
  }

  if (track.note) {
    const note = document.createElement('div');
    note.className = 'track-note';
    note.textContent = track.note;

  (track.sections || []).forEach(sec => {

    const div = document.createElement('div');

// ── SELECTION ──
function selectAlbum(num) {
  state.album = num;
  state.track = -1; // land on the album cover first
  document.body.setAttribute('data-album', String(num));
  renderAlbumTabs();
  renderTrackNav();
  renderCover();
  renderText();
}

function selectTrack(i) {
  const meta = ALBUMS[state.album];
  if (i < -1 || i >= meta.tracks.length) return;
  state.track = i;
  renderTrackNav();
  renderCover();
  renderText();
}

function stepTrack(dir) {
  const meta = ALBUMS[state.album];
  let next = state.track + dir;

  if (next < -1) {
    if (state.album > 1) {
      const prevAlbum = state.album - 1;
      state.album = prevAlbum;
      state.track = ALBUMS[prevAlbum].tracks.length - 1;
      document.body.setAttribute('data-album', String(prevAlbum));
      renderAlbumTabs(); renderTrackNav(); renderCover(); renderText();
    }
    return;
  }
  if (next >= meta.tracks.length) {
    if (state.album < 4) { selectAlbum(state.album + 1); }
    return;
  }
  selectTrack(next);
}

document.getElementById('prevBtn').addEventListener('click', () => stepTrack(-1));
document.getElementById('nextBtn').addEventListener('click', () => stepTrack(1));
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') stepTrack(1);
  if (e.key === 'ArrowLeft') stepTrack(-1);
});

let playingIdx = null;

function trackFileName(albumNum, idx) {
  const t = ALBUMS[albumNum].tracks[idx];
  return `${String(idx+1).padStart(2,'0')} - ${t.title}.mp3`;
}

function isRowPlaying(albumNum, idx) {
  return playingAlbum === albumNum && playingIdx === idx;
}

// Selects the track (switching album view if needed) AND starts playback.
function playTrackDirect(albumNum, idx) {
  const meta = ALBUMS[albumNum];
  if (idx < 0 || idx >= meta.tracks.length) return;
  if (state.album !== albumNum) {
    state.album = albumNum;
    document.body.setAttribute('data-album', String(albumNum));
    renderAlbumTabs();
  }
  state.track = idx;
  renderTrackNav();
  renderCover();
  renderText();
  loadAndPlay(albumNum, idx);
}

function loadAndPlay(albumNum, idx) {
  playingAlbum = albumNum;
  playingIdx = idx;
  const file = trackFileName(albumNum, idx);
  audioPlayer.src = AUDIO_PATH + file;
  audioPlayer.play().catch(err => console.warn('Playback failed — check the file exists:', file, err));
  updateMiniPlayer(albumNum, idx);
  refreshPlayingIndicators();
}

function togglePlayPause() {
  if (!audioPlayer.src) return;
  if (audioPlayer.paused) audioPlayer.play(); else audioPlayer.pause();
}

// Autoplay: rolls from track to track, then album to album (I → II → III → IV).
function playNextGlobal() {
  if (playingAlbum === null) return;
  const meta = ALBUMS[playingAlbum];
  if (playingIdx + 1 < meta.tracks.length) {
    playTrackDirect(playingAlbum, playingIdx + 1);
  } else if (playingAlbum < 4) {
    playTrackDirect(playingAlbum + 1, 0);
  }
}

function playPrevGlobal() {
  if (playingAlbum === null) return;
  if (playingIdx - 1 >= 0) {
    playTrackDirect(playingAlbum, playingIdx - 1);
  } else if (playingAlbum > 1) {
    const prevMeta = ALBUMS[playingAlbum - 1];
    playTrackDirect(playingAlbum - 1, prevMeta.tracks.length - 1);
  }
}

function updateMiniPlayer(albumNum, idx) {
  const meta = ALBUMS[albumNum];
  const t = meta.tracks[idx];
  document.getElementById('mpTitle').textContent = t.title;
  document.getElementById('mpAlbum').textContent = meta.title.toUpperCase() + ' — TRACK ' + String(idx+1).padStart(2,'0');
  document.getElementById('miniPlayer').classList.add('active');
}

function refreshPlayingIndicators() {
  document.querySelectorAll('.track-row, .ao-track-item').forEach(row => {
    const idx = parseInt(row.dataset.idx, 10);
    const btn = row.querySelector('.row-play-btn');
    const isThis = isRowPlaying(state.album, idx);
    row.classList.toggle('playing', isThis && !audioPlayer.paused);
    if (btn) btn.textContent = (isThis && !audioPlayer.paused) ? '⏸' : '▶';
  });
  const mainBtn = document.getElementById('thPlayBtn');
  if (mainBtn && !mainBtn.disabled) {
    const isThis = isRowPlaying(state.album, state.track);
    mainBtn.textContent = (isThis && !audioPlayer.paused) ? '⏸' : '▶';
  }
  const mpBtn = document.getElementById('mpPlayPause');
  if (mpBtn) mpBtn.textContent = audioPlayer.paused ? '▶' : '⏸';
}

function formatTime(s) {
  if (!isFinite(s) || s < 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

audioPlayer.addEventListener('play', refreshPlayingIndicators);
audioPlayer.addEventListener('pause', refreshPlayingIndicators);
audioPlayer.addEventListener('ended', playNextGlobal);
audioPlayer.addEventListener('timeupdate', () => {
  const prog = document.getElementById('mpProgress');
  if (audioPlayer.duration) prog.value = (audioPlayer.currentTime / audioPlayer.duration) * 100;
  document.getElementById('mpTime').textContent = `${formatTime(audioPlayer.currentTime)} / ${formatTime(audioPlayer.duration)}`;
});

document.getElementById('thPlayBtn').addEventListener('click', () => {
  if (state.track === -1) return;
  if (isRowPlaying(state.album, state.track)) togglePlayPause();
  else playTrackDirect(state.album, state.track);
});
document.getElementById('mpPlayPause').addEventListener('click', togglePlayPause);
document.getElementById('mpNext').addEventListener('click', playNextGlobal);
document.getElementById('mpPrev').addEventListener('click', playPrevGlobal);
document.getElementById('mpProgress').addEventListener('input', (e) => {
  if (audioPlayer.duration) audioPlayer.currentTime = (e.target.value / 100) * audioPlayer.duration;
});

// ── VOLUME CONTROL ──
const mpMuteBtn = document.getElementById('mpMute');
const mpVolumeSlider = document.getElementById('mpVolume');
let lastVolume = 1;

audioPlayer.volume = 1;

function updateVolumeIcon() {
  if (audioPlayer.muted || audioPlayer.volume === 0) mpMuteBtn.textContent = '🔇';
  else if (audioPlayer.volume < 0.5) mpMuteBtn.textContent = '🔉';
  else mpMuteBtn.textContent = '🔊';
}

mpVolumeSlider.addEventListener('input', (e) => {
  const v = e.target.value / 100;
  audioPlayer.volume = v;
  audioPlayer.muted = false;
  if (v > 0) lastVolume = v;
  updateVolumeIcon();
});

mpMuteBtn.addEventListener('click', () => {
  if (audioPlayer.muted || audioPlayer.volume === 0) {
    audioPlayer.muted = false;
    audioPlayer.volume = lastVolume || 1;
    mpVolumeSlider.value = Math.round(audioPlayer.volume * 100);
  } else {
    lastVolume = audioPlayer.volume;
    audioPlayer.muted = true;
    mpVolumeSlider.value = 0;
  }
  updateVolumeIcon();
});

// ── FULLSCREEN TOGGLE ──
const fsBtn = document.getElementById('fullscreenBtn');
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => console.warn('Fullscreen request failed:', err));
  } else {
    document.exitFullscreen();
  }
});
document.addEventListener('fullscreenchange', () => {
  fsBtn.textContent = document.fullscreenElement ? '⤢' : '⛶';
  fsBtn.title = document.fullscreenElement ? 'Exit fullscreen' : 'Toggle fullscreen';
});

// ── INIT ──
renderAlbumTabs();
renderTrackNav();
renderCover();
renderText();
initPulseCanvas();
</script>
</body>
</html>
