<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AETHER ODYSSEY — COMPLETE SAGA ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #4db8ff; --accent-deep: #1a6fc4; --accent-pale: #a8d8ff;
    --bg: #03060f; --bg-panel: #070d1a; --bg-raise: #0a1220;
    --border: #2a4a6a; --border-dim: #0d3b6e;
    --text-dim: #5a7fa8;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: #ccc;
  }

  body {
    transition: background 0.5s ease;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.025) 2px, rgba(255,255,255,0.025) 4px);
    pointer-events: none; z-index: 9000;
  }

  /* ── ALBUM THEMES ── */
  body[data-album="1"] { --accent:#4db8ff; --accent-deep:#1a6fc4; --accent-pale:#a8d8ff; --bg:#03060f; --bg-panel:#070d1a; --bg-raise:#0c1526; --border:#2a4a6a; --border-dim:#0d3b6e; --text-dim:#5a7fa8; }
  body[data-album="2"] { --accent:#b06dff; --accent-deep:#6b24c4; --accent-pale:#d4aaff; --bg:#05030f; --bg-panel:#0a0714; --bg-raise:#130c22; --border:#3a2060; --border-dim:#2d0a6e; --text-dim:#7a5aa8; }
  body[data-album="3"] { --accent:#4dff8a; --accent-deep:#1a8a40; --accent-pale:#a8ffc4; --bg:#030f05; --bg-panel:#060f08; --bg-raise:#0c1a10; --border:#204030; --border-dim:#0a4020; --text-dim:#5aa870; }
  body[data-album="4"] { --accent:#ffc840; --accent-deep:#c47a00; --accent-pale:#ffe8a0; --bg:#0f0a00; --bg-panel:#140e00; --bg-raise:#221a05; --border:#402800; --border-dim:#5a3a00; --text-dim:#a07830; }

  /* ── APP SHELL ── */
  .app {
    height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.7rem 1.4rem; border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
    transition: border-color 0.5s ease, background 0.5s ease;
    z-index: 10;
  }
  .topbar-brand { display: flex; align-items: baseline; gap: 0.8rem; }
  .topbar-title { font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:0.3em; font-size:1rem; text-transform:uppercase; color:#eee; }
  .topbar-sub { font-size:0.58rem; letter-spacing:0.2em; color: var(--text-dim); text-transform:uppercase; transition: color 0.5s ease; }
  .topbar-stamp { font-size:0.55rem; letter-spacing:0.2em; color: var(--accent); text-transform:uppercase; transition: color 0.5s ease; }

  .fullscreen-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    width: 1.9rem; height: 1.9rem; flex-shrink: 0; cursor: pointer;
    font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .fullscreen-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg-raise); }

  .app-main {
    display: grid;
    grid-template-columns: 270px minmax(0,1.15fr) minmax(0,1fr);
    min-height: 0;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 0;
    transition: border-color 0.5s ease, background 0.5s ease;
  }

  .album-tabs {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem;
    padding: 0.8rem; border-bottom: 1px solid var(--border);
    transition: border-color 0.5s ease;
  }
  .album-tab {
    font-family:'Share Tech Mono',monospace; background: transparent;
    border: 1px solid #333; color: #666; cursor: pointer;
    font-size: 0.6rem; letter-spacing: 0.1em; padding: 0.5rem 0.3rem;
    text-transform: uppercase; text-align: center; transition: all 0.2s;
    line-height: 1.5;
  }
  .album-tab .num { display:block; font-size:0.9rem; font-weight:bold; }
  .album-tab:hover { border-color: #888; color: #ccc; }
  .album-tab.active-1 { border-color:#1a6fc4; color:#4db8ff; background:#4db8ff14; }
  .album-tab.active-2 { border-color:#6b24c4; color:#b06dff; background:#b06dff14; }
  .album-tab.active-3 { border-color:#1a8a40; color:#4dff8a; background:#4dff8a14; }
  .album-tab.active-4 { border-color:#c47a00; color:#ffc840; background:#ffc84014; }

  .track-nav {
    flex: 1; overflow-y: auto; padding: 0.4rem;
  }
  .track-row {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.55rem 0.6rem; cursor: pointer; user-select: none;
    border-left: 2px solid transparent; transition: all 0.15s;
    border-radius: 2px;
  }
  .track-row:hover { background: var(--bg-raise); }
  .track-row.active { background: var(--bg-raise); border-left-color: var(--accent); }
  .track-row .t-num { font-size: 0.58rem; color: var(--accent-deep); min-width: 1.6rem; transition: color 0.5s ease; }
  .track-row .t-title {
    font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:0.06em;
    font-size: 0.82rem; text-transform: uppercase; color: #99a; flex:1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .track-row.active .t-title { color: var(--accent-pale); }
  .track-row .t-inst { font-size: 0.5rem; color: var(--text-dim); letter-spacing: 0.1em; transition: color 0.5s ease; }

  .cover-row {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.65rem 0.6rem; margin-bottom: 0.5rem; cursor: pointer; user-select: none;
    border: 1px solid var(--border); border-left: 2px solid var(--border-dim);
    transition: all 0.15s;
  }
  .cover-row:hover { background: var(--bg-raise); border-color: var(--accent-deep); }
  .cover-row.active { background: var(--bg-raise); border-left-color: var(--accent); border-color: var(--accent-deep); }
  .cover-row .c-icon { font-size: 0.85rem; color: var(--accent); transition: color 0.5s ease; }
  .cover-row .c-label { font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:0.15em; font-size: 0.78rem; text-transform: uppercase; color: #ccd; }
  .cover-row.active .c-label { color: var(--accent-pale); }
  .track-nav-divider { height: 1px; background: var(--border); opacity: 0.6; margin: 0 0.6rem 0.5rem; transition: background 0.5s ease; }

  .sidebar-foot {
    padding: 0.6rem 1rem; font-size: 0.52rem; letter-spacing: 0.15em;
    color: #333; border-top: 1px solid var(--border); text-transform: uppercase;
    transition: border-color 0.5s ease;
  }

  /* ── PLAY BUTTONS & NOW-PLAYING STATE ── */
  .row-play-btn {
    flex-shrink: 0; width: 1.5rem; height: 1.5rem; border-radius: 50%;
    border: 1px solid var(--border-dim); background: transparent; color: var(--text-dim);
    font-size: 0.55rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .row-play-btn:hover { border-color: var(--accent); color: var(--accent); }
  .track-row.playing, .ao-track-item.playing { background: var(--bg-raise); }
  .track-row.playing .row-play-btn, .ao-track-item.playing .row-play-btn { border-color: var(--accent); color: var(--accent); background: var(--bg); }
  .track-row.playing .t-title, .ao-track-item.playing .aot-title { color: var(--accent-pale); }

  .th-play-btn { color: var(--accent); border-color: var(--border-dim); }
  .th-play-btn:hover:not(:disabled) { border-color: var(--accent); }

  /* ── MINI PLAYER ── */
  .mini-player {
    display: none; align-items: center; gap: 1rem;
    padding: 0.55rem 1.4rem;
    background: var(--bg-panel); border-top: 1px solid var(--border);
    transition: border-color 0.5s ease, background 0.5s ease;
  }
  .mini-player.active { display: flex; }
  .mp-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    width: 2rem; height: 2rem; border-radius: 50%; flex-shrink: 0;
    cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .mp-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mp-play { width: 2.3rem; height: 2.3rem; font-size: 0.8rem; }
  .mp-info { min-width: 8rem; max-width: 240px; overflow: hidden; }
  .mp-title { font-family:'Rajdhani',sans-serif; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mp-album { font-size: 0.55rem; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.5s ease; }
  .mp-progress {
    flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
    background: var(--border); border-radius: 2px; cursor: pointer; outline: none;
    transition: background 0.5s ease;
  }
  .mp-progress::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  .mp-progress::-moz-range-thumb { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; }
  .mp-time { font-size: 0.55rem; color: var(--text-dim); letter-spacing: 0.05em; white-space: nowrap; flex-shrink: 0; transition: color 0.5s ease; }

  .mp-volume { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
  .mp-vol-btn { font-size: 0.85rem; }
  .mp-vol-slider {
    width: 70px; height: 3px; -webkit-appearance: none; appearance: none;
    background: var(--border); border-radius: 2px; cursor: pointer; outline: none;
    transition: background 0.5s ease;
  }
  .mp-vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  .mp-vol-slider::-moz-range-thumb { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; }

  @media (max-width: 700px) {
    .mp-info { min-width: 4.5rem; max-width: 100px; }
    .mp-time { display: none; }
    .mp-vol-slider { width: 46px; }
  }

  /* ── COVER PANE ── */
  .cover-pane {
    position: relative; overflow: hidden; background: #000;
    border-right: 1px solid var(--border);
    transition: border-color 0.5s ease;
    display: flex; align-items: stretch; justify-content: stretch;
  }
  .cover-img-wrap { position: absolute; inset: 0; }
  .cover-img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.92; transition: opacity 0.4s ease;
  }
  .cover-img.swap { opacity: 0; }
  .cover-fallback {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 40%, var(--bg-raise) 0%, var(--bg) 80%);
  }
  .cover-fallback svg { width: 100%; height: 100%; display: block; }
  .cover-fallback .placeholder-caption {
    position: absolute; bottom: 0.7rem; right: 0.9rem; z-index: 3;
    font-size: 0.5rem; letter-spacing: 0.15em; color: var(--text-dim); opacity: 0.6;
    text-transform: uppercase; transition: color 0.5s ease; pointer-events: none;
  }
  .cover-scrim {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.55) 30%, rgba(0,0,0,0.05) 55%, rgba(0,0,0,0.35) 100%);
  }
  .cover-content {
    position: relative; z-index: 2; display: flex; flex-direction: column;
    justify-content: space-between; width: 100%; padding: 1.6rem 2rem;
  }
  .cover-top { display:flex; justify-content: space-between; font-size: 0.58rem; letter-spacing: 0.15em; color: rgba(255,255,255,0.55); text-transform: uppercase; }
  .cover-bottom { }
  .cover-eyebrow { font-size: 0.62rem; letter-spacing: 0.35em; color: var(--accent); text-transform: uppercase; margin-bottom:0.5rem; transition: color 0.5s ease; }
  .cover-title {
    font-family:'Rajdhani',sans-serif; font-size: clamp(2rem, 4vw, 3.4rem); font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; color: #fff; line-height: 1.05;
    text-shadow: 0 0 40px rgba(0,0,0,0.8);
  }
  .cover-tagline { font-size: 0.8rem; font-style: italic; color: #ddd; margin-top: 0.6rem; max-width: 480px; }
  .cover-meta { display:flex; flex-wrap: wrap; gap: 1.4rem; margin-top: 1.1rem; font-size: 0.58rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); text-transform: uppercase; }
  .cover-meta span { color: var(--accent); transition: color 0.5s ease; }
  .cover-pulse { width: 100%; height: 34px; margin-top: 0.9rem; opacity: 0.6; display:block; }

  /* ── TEXT PANE ── */
  .text-pane { display: flex; flex-direction: column; min-height: 0; background: var(--bg); transition: background 0.5s ease; }
  .text-head {
    padding: 1rem 1.6rem 0.8rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.8rem; transition: border-color 0.5s ease;
  }
  .text-head .th-num { font-size: 0.62rem; color: var(--accent-deep); letter-spacing: 0.1em; transition: color 0.5s ease; }
  .text-head .th-title { font-family:'Rajdhani',sans-serif; font-size: 1.35rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; flex: 1; }
  .text-head .th-badge { font-size: 0.5rem; letter-spacing: 0.15em; padding: 0.25rem 0.55rem; border: 1px solid var(--border-dim); color: var(--text-dim); text-transform: uppercase; white-space: nowrap; transition: all 0.5s ease; }
  .text-nav-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    width: 1.8rem; height: 1.8rem; cursor: pointer; font-size: 0.75rem; flex-shrink:0;
    transition: all 0.2s;
  }
  .text-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .text-nav-btn:disabled { opacity: 0.25; cursor: default; }

  .text-body { flex: 1; overflow-y: auto; padding: 1.2rem 1.6rem 2.2rem; }

  .track-note {
    padding: 0.75rem 1rem; margin-bottom: 1.3rem;
    background: rgba(255,255,255,0.02); border-left: 2px solid var(--accent);
    font-size: 0.75rem; color: #999; font-style: italic; line-height: 1.7;
    transition: border-color 0.5s ease;
  }

  .lyric-section { margin-bottom: 1.2rem; }
  .sec-label {
    font-size: 0.6rem; letter-spacing: 0.2em; margin-bottom: 0.45rem;
    display: flex; align-items: center; gap: 0.5rem; color: var(--border);
    text-transform: uppercase; transition: color 0.5s ease;
  }
  .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); opacity: 0.5; max-width: 80px; }
  .sec-lines { font-size: 0.85rem; line-height: 1.85; white-space: pre-line; color: #ddd; padding-left: 0.5rem; }

  .lyric-section.chorus .sec-label { color: var(--accent); }
  .lyric-section.chorus .sec-lines { color: #f8f8ff; }
  .lyric-section.final-chorus .sec-label { color: var(--accent-pale); }
  .lyric-section.final-chorus .sec-lines { color: #fff; text-shadow: 0 0 14px rgba(255,255,255,0.15); }
  .lyric-section.bridge .sec-lines { color: var(--accent-pale); font-style: italic; opacity: 0.85; }
  .lyric-section.outro .sec-lines { color: #fff; font-weight: bold; text-shadow: 0 0 16px var(--accent); }
  .lyric-section.motif { padding: 0.6rem 0.9rem; border: 1px dashed var(--border); opacity: 0.7; }
  .lyric-section.motif .sec-lines { font-size: 0.72rem; font-style: italic; }

  .instrumental-view { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 1rem; padding: 2.4rem 1rem; }
  .instrumental-view .il { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); transition: color 0.5s ease; }
  .instrumental-view .id { font-size: 0.82rem; line-height: 1.8; font-style: italic; color: #999; max-width: 420px; }
  .instrumental-view svg { width: 100%; max-width: 360px; opacity: 0.45; }

  .album-overview { padding: 0.4rem 0 1rem; }
  .ao-tagline { font-size: 0.95rem; font-style: italic; color: #ddd; line-height: 1.7; margin-bottom: 1.4rem; }
  .ao-meta { display: flex; flex-wrap: wrap; gap: 1.2rem 1.8rem; margin-bottom: 1.6rem; padding-bottom: 1.4rem; border-bottom: 1px solid var(--border); transition: border-color 0.5s ease; }
  .ao-meta div { font-size: 0.62rem; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; transition: color 0.5s ease; }
  .ao-meta span { color: var(--accent); display: block; margin-top: 0.2rem; font-size: 0.75rem; transition: color 0.5s ease; }
  .ao-list-label { font-size: 0.6rem; letter-spacing: 0.25em; color: var(--border); text-transform: uppercase; margin-bottom: 0.7rem; transition: color 0.5s ease; }
  .ao-track-item {
    display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem 0.3rem;
    cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.15s;
  }
  .ao-track-item:hover { background: var(--bg-raise); }
  .ao-track-item .aot-num { font-size: 0.62rem; color: var(--accent-deep); min-width: 1.6rem; transition: color 0.5s ease; }
  .ao-track-item .aot-title { font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:0.05em; font-size: 0.88rem; text-transform: uppercase; color: #bbc; }
  .ao-track-item .aot-inst { margin-left: auto; font-size: 0.5rem; color: var(--text-dim); letter-spacing: 0.1em; transition: color 0.5s ease; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-deep); }

  @media (max-width: 980px) {
    html, body { overflow-y: auto; height: auto; }
    .app { height: auto; }
    .app-main { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 46vh; }
    .cover-pane { height: 42vh; border-right: none; border-bottom: 1px solid var(--border); }
    .text-body { max-height: none; }
  }
</style>
</head>
<body data-album="1">

<div class="app">

  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-title">Aether Odyssey</div>
      <div class="topbar-sub">Wondu // Complete Saga Archive</div>
    </div>
    <div class="topbar-stamp" id="topbarStamp">⬡ CLASSIFICATION: MISSION CULTURAL LOG ⬡</div>
    <button class="fullscreen-btn" id="fullscreenBtn" title="Toggle fullscreen">⛶</button>
  </div>

  <div class="app-main">

    <nav class="sidebar">
      <div class="album-tabs" id="albumTabs"></div>
      <div class="track-nav" id="trackNav"></div>
      <div class="sidebar-foot" id="sidebarFoot">⬡ Elysium Archive Project ⬡</div>
    </nav>

    <section class="cover-pane">
      <div class="cover-img-wrap">
        <img class="cover-img" id="coverImg" src="" alt="">
        <div class="cover-fallback" id="coverFallback" style="display:none;"></div>
      </div>
      <div class="cover-scrim"></div>
      <div class="cover-content">
        <div class="cover-top">
          <div id="coverNode">NODE: ELYSIUM-PRIMARY</div>
          <div id="coverArchive">AETHER ODYSSEY // SAGA DOCUMENT ARCHIVE</div>
        </div>
        <div class="cover-bottom">
          <div class="cover-eyebrow" id="coverEyebrow">// Album I of IV — Aether Odyssey //</div>
          <div class="cover-title" id="coverTitle">Ignition</div>
          <div class="cover-tagline" id="coverTagline"></div>
          <div class="cover-meta" id="coverMeta"></div>
          <canvas class="cover-pulse" id="coverPulse"></canvas>
        </div>
      </div>
    </section>

    <section class="text-pane">
      <div class="text-head">
        <button class="text-nav-btn" id="prevBtn" title="Previous track">◀</button>
        <div class="th-num" id="thNum">// TRACK_01</div>
        <div class="th-title" id="thTitle">The Signal</div>
        <div class="th-badge" id="thBadge" style="display:none;">INSTRUMENTAL</div>
        <button class="text-nav-btn th-play-btn" id="thPlayBtn" title="Play this track">▶</button>
        <button class="text-nav-btn" id="nextBtn" title="Next track">▶</button>
      </div>
      <div class="text-body" id="textBody"></div>
    </section>

  </div>

  <div class="mini-player" id="miniPlayer">
    <button class="mp-btn" id="mpPrev" title="Previous track">⏮</button>
    <button class="mp-btn mp-play" id="mpPlayPause" title="Play / Pause">▶</button>
    <button class="mp-btn" id="mpNext" title="Next track">⏭</button>
    <div class="mp-info">
      <div class="mp-title" id="mpTitle">—</div>
      <div class="mp-album" id="mpAlbum">—</div>
    </div>
    <input type="range" class="mp-progress" id="mpProgress" min="0" max="100" value="0">
    <span class="mp-time" id="mpTime">0:00 / 0:00</span>

<script>
// ── ALBUM 1 DATA ──
const tracksAlbum1 = [
{ title:"The Signal", image:"01__The_Signal.png", note:"It is 2146. A deep-space radio array in the Atacama mountains has intercepted a repeating signal of unmistakable mathematical structure — something built, not born. The world does not yet know what it means, but for the first time in decades, eight billion people are looking in the same direction.", sections:[
    {label:"VERSE_01",type:"verse",text:`In the static of the universe, a whisper breaks the night\nA pattern in the darkness, mathematics carved in light\nWe aimed our dishes skyward, let the frequencies bleed through\nSomething out beyond the black was calling — calling to you`},
    {label:"PRE-CHORUS",type:"pre",text:`Every scientist with trembling hands\nEvery government, every flag, every land\nFell silent at the same moment — we all heard the same sound`},
    {label:"CHORUS",type:"chorus",text:`We heard you calling, we heard you calling\nAcross the light-years, through the dark and the dying\nWe heard you calling, deep in our bones it's burning\nWe're coming home — we're coming home`},
    {label:"VERSE_02",type:"verse",text:`They said it was an echo, just a ghost in the machine\nThey said don't let the dreamers start believing what they've seen\nBut the signal kept on pulsing with a rhythm like a heart\nAnd eight billion souls went quiet — something ancient tore apart`},
    {label:"PRE-CHORUS",type:"pre",text:`Every child with their face turned to the stars\nEvery broken soul reaching past the scars\nWe all felt the same pull — we all heard the same call`},
    {label:"CHORUS",type:"chorus",text:`We heard you calling, we heard you calling\nAcross the light-years, through the dark and the dying\nWe heard you calling, deep in our bones it's burning\nWe're coming home — we're coming home`},
    {label:"BRIDGE",type:"bridge",text:`Maybe it's a warning, maybe it's a door\nMaybe we were always meant for something more\nThe void is not empty — something breathes inside\nAnd we will cross the nothing on the strength of our belief\nWe will not be silenced, we will not be blind\nWe are the answer — we are the reply`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`We heard you calling, we heard you calling\nAcross the light-years, through the dark and the dying\nWe heard you calling — and we answered, we answered\nWe're coming home — we're leaving everything we've ever known\nWe're coming home`},
  ]},
  { title:"Dying Blue", image:"02__Dying_Blue.png", note:"The coastal cities are already gone. Firestorms roll across the northern continents and the monsoon cycles have collapsed into silence. The scientists who designed the Aether project never named what they were running from — but standing in the smoke of the world they loved, they didn't need to.", sections:[
    {label:"VERSE_01",type:"verse",text:`The rivers run like rust now, and the forests choke on smoke\nThe cities built on shorelines slowly swallow as they soak\nMy daughter asks me why the sky turned grey above our street\nI tell her that the world got sick — I can't explain the grief`},
    {label:"PRE-CHORUS",type:"pre",text:`We burned it all so beautifully\nWe couldn't see what we were taking\nNow the cradle's cracked and breaking`},
    {label:"CHORUS",type:"chorus",text:`Dying blue, dying blue\nYou were perfect and we never knew\nOceans gone, the mountains too\nStill I'd give anything to come back to you\nDying blue`},
    {label:"VERSE_02",type:"verse",text:`They picked eight thousand names from eight billion screaming souls\nLike lottery tickets handed out to fill the Aether's hold\nI watched my neighbours' numbers fail and saw their faces fall\nHow do you walk away from everyone — how do you leave them all`},
    {label:"PRE-CHORUS",type:"pre",text:`We chose survival over grace\nAnd every choice has left a scar\nHere we are — god, here we are`},
    {label:"CHORUS",type:"chorus",text:`Dying blue, dying blue\nYou were perfect and we never knew\nOceans gone, the mountains too\nStill I'd give anything to come back to you\nDying blue`},
    {label:"BRIDGE",type:"bridge",text:`Don't forget the colour of the water\nDon't forget the smell of rain on stone\nDon't forget the way the light hit the mountains\nCarry every memory — you are not alone\nWe will build you somewhere in the stars\nWe will name it after everything you are`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Dying blue, dying blue\nEverything we broke, everything we threw\nWe're sorry — god, we're sorry it came true\nBut somewhere in the dark we'll build a world for you\nGoodbye, blue — goodbye blue`},
  ]},
  { title:"Last Sunrise", image:"03__Last_Sunrise.png", note:"Selection day is three weeks away. The crew rosters have been posted, and across every city on Earth, people are checking the lists — some with held breath, some already knowing. One by one, the chosen are making their way to the embarkation zones, leaving behind everything that cannot fit in a single bag.", sections:[
    {label:"VERSE_01",type:"verse",text:`I set my alarm for the last morning I'll ever have here\nI walked out to the hillside where we kissed away our fear\nThe sun came up like always, like it didn't know my name\nLike the world wasn't ending — like everything was still the same`},
    {label:"PRE-CHORUS",type:"pre",text:`I took a photograph of nothing special\nJust a porch light and an oak tree and the sky\nBecause the ordinary is what we forget — and I won't say goodbye`},
    {label:"CHORUS",type:"chorus",text:`Last sunrise, burn me golden\nOne more moment, let me hold it\nI will carry all this light into the black\nLast sunrise, don't you fade yet\nThere's so much I haven't said yet\nEven if I'm never — ever — coming back`},
    {label:"VERSE_02",type:"verse",text:`My mother held my face between her hands and didn't speak\nMy son — three years old — was sleeping, never knew I kissed his cheek\nThey say the mission saves the species, that the math demands we go\nBut mathematics never felt a father's love — I want you all to know`},
    {label:"PRE-CHORUS",type:"pre",text:`I will remember every ordinary Tuesday\nI will remember every argument and fight\nBecause even the broken parts were beautiful — and I will hold them tight`},
    {label:"CHORUS",type:"chorus",text:`Last sunrise, burn me golden\nOne more moment, let me hold it\nI will carry all this light into the black\nLast sunrise, don't you fade yet\nThere's so much I haven't said yet\nEven if I'm never — ever — coming back`},
    {label:"BRIDGE",type:"bridge",text:`Maybe in a hundred years they'll read what I have left behind\nMaybe in another galaxy they'll know this human mind\nThat loved so hard it burned — that grieved so deep it shone\nThat rose up when the world was gone and chose to carry on\nRise — rise — one last time with me\nRise — rise — rise`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Last sunrise, I am golden\nIn this grief I find I'm whole\nI will carry every face I love into the stars\nLast sunrise — you made me\nEvery scar you left has saved me\nI am everything you are — I am everything you are`},
  ]},
  { title:"Forge the Ark", image:"04__Forge_the_Ark.png", note:"In low Earth orbit, ninety thousand workers in rotating shifts have been welding the Aether together for eleven years. The ship is the largest object humanity has ever constructed — and it is almost ready. On the ground, the last boarding gates are being sealed.", sections:[
    {label:"VERSE_01",type:"verse",text:`Ninety thousand workers in the orbital ring\nWelding light to titanium, forging everything\nNo sleep, no shift end, just the hiss of the torch\nEvery rivet a heartbeat — every beam a new hope born`},
    {label:"PRE-CHORUS",type:"pre",text:`Steel and fire and human will\nMountains moved by the force of our need\nThis is the last great thing we'll build`},
    {label:"CHORUS",type:"chorus",text:`Forge the Ark — hammer it holy\nWeld the hull — let the seams hold slowly\nEvery scar on our hands is a prayer\nForge the Ark — build it or die trying\nWe are the fire — we are the iron\nWe will carry humanity through the air — forge the Ark`},
    {label:"VERSE_02",type:"verse",text:`The blueprints were in seventeen languages, built in ten\nEvery nation poured its best and brightest in\nEnemies sat side by side and drove the panels home\nBecause the Ark belongs to everyone — even those who stay alone`},
    {label:"PRE-CHORUS",type:"pre",text:`Something holy in the work of desperate hands\nWhen survival strips away the flag and creed\nWe are finally just the human need`},
    {label:"CHORUS",type:"chorus",text:`Forge the Ark — hammer it holy\nWeld the hull — let the seams hold slowly\nEvery scar on our hands is a prayer\nForge the Ark — build it or die trying\nWe are the fire — we are the iron\nWe will carry humanity through the air — forge the Ark`},
    {label:"BRIDGE",type:"bridge",text:`Eight thousand seats in the belly of a miracle\nEvery corridor a promise, every window a vow\nWe didn't build a ship — we built a cathedral\nWe didn't build an Ark — we built the now\nFORGE IT — DRIVE IT — SEAL IT TIGHT\nCARRY THE LIVING INTO THE LIGHT`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Forge the Ark — it is done, it is holy\nShe holds the hull — God, the seams held, slowly\nEvery scar on our hands was a prayer\nForge the Ark — we built it, we did it\nWe are the iron, the fire — admit it\nWe carried humanity into the air — the Ark is forged`},
  ]},
  { title:"The Chosen", image:"05__The_Chosen.png", note:"Eight thousand names were selected from a global pool of four hundred million applicants. The algorithm was blind to wealth, nationality, and faith. The protests outside the embarkation zones have been running for six weeks. Inside, the chosen walk past the gates and do not look back.", sections:[
    {label:"VERSE_01",type:"verse",text:`The algorithm ran in seventeen seconds flat\nEight thousand names from eight billion — imagine that\nGeneticist, engineer, physician, dreamer, child\nThey said we picked the best of us — the data reconciled`},
    {label:"PRE-CHORUS",type:"pre",text:`But every name that made the list\nMeans ten thousand names that didn't\nAnd the weight of that is infinite`},
    {label:"CHORUS",type:"chorus",text:`We are the chosen — we carry the cost\nWe are the lucky ones built on the lost\nEvery seat on this ship is a grave for the ones\nWho were just as worthy but just didn't run\nWe are the chosen — god, what have we done`},
    {label:"VERSE_02",type:"verse",text:`The protests burned for seven weeks outside the gates\nThe chosen ones were moved inside like prisoners of fate\nI saw a mother with a sign that read: 'Why not my son?'\nI couldn't meet her eyes — there was no answer to be done`},
    {label:"PRE-CHORUS",type:"pre",text:`The mission was the math, they said\nSurvival of the representative\nBut nothing about this feels representative`},
    {label:"CHORUS",type:"chorus",text:`We are the chosen — we carry the cost\nWe are the lucky ones built on the lost\nEvery seat on this ship is a grave for the ones\nWho were just as worthy but just didn't run\nWe are the chosen — god, what have we done`},
    {label:"BRIDGE",type:"bridge",text:`We didn't ask for this — we didn't ask for this\nSome of us begged to stay behind\nWe didn't earn this — we just were selected\nBy a God-playing machine and its cold design\nBut we will honour every name not carved in this hull\nWe will survive for all the ones who couldn't`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`We are the chosen — we carry them all\nEvery soul left behind is written on our walls\nWe will live for the ones who deserved what we got\nWe are the chosen — and we will not forget\nWe will not — we will not — forget`},
  ]},
  { title:"Countdown Sequence", image:"06__Countdown_Sequence.png", note:"T-minus seventy-two hours. Mission control has gone to full lockdown. The Aether sits in low orbit, fully fuelled, every system nominal. Eight thousand people are in their launch positions. The Signal pulses quietly from deep space — patient, as if it has been waiting for precisely this moment.", sections:[
    {label:"VERSE_01",type:"verse",text:`T-minus sixty — final systems sweep\nEight thousand heartbeats — most of them too scared to sleep\nThe captain grips the console, knuckles white as bone\nThe whole of human history riding on this unknown`},
    {label:"PRE-CHORUS",type:"pre",text:`T-minus thirty — don't you look away\nT-minus twenty — breathe\nT-minus ten — this is everything`},
    {label:"CHORUS",type:"chorus",text:`We were made for this moment, this fire, this night\nEight thousand souls on the edge of the light\nNo going back — no going back\nWe were made for this — we were made for this`},
    {label:"VERSE_02",type:"verse",text:`Mission control goes silent — every breath is held\nThe Aether groans alive like something long compelled\nThe plasma drives spin upward — God, the sound of it\nLike a thousand thunderstorms compressed into a single hit`},
    {label:"PRE-CHORUS",type:"pre",text:`T-minus five — I can't stop shaking\nT-minus four — I'm breaking\nT-minus everything — here we go`},
    {label:"CHORUS",type:"chorus",text:`We were made for this moment, this fire, this night\nEight thousand souls on the edge of the light\nNo going back — no going back\nWe were made for this — we were made for this`},
    {label:"BRIDGE",type:"bridge",text:`TEN — the Pulse ignites\nNINE — we seal the night\nEIGHT — no turning back now\nSEVEN — the engines crack now\nSIX — hold on to something\nFIVE — we're becoming nothing\nFOUR — we're becoming everything\nTHREE — TWO — ONE —`},
    {label:"OUTRO",type:"outro",text:`IGNITE — the Aether rises\nIGNITE — through fire and crisis\nIGNITE — humanity's answer to the stars\nIGNITE — we are no longer who we were\nIGNITE — IGNITE — IGNITE`},
  ]},
  { title:"Ignition", image:"07__Ignition.png", note:"The Aether clears the launch tower at 04:09 UTC on April 9th, 2147. The plasma drives ignite at full thrust. In the cities below, every screen carries the same image. Those who cannot watch listen. The sound reaches the ground seventeen seconds after the light.", sections:[
    {label:"VERSE_01",type:"verse",text:`She clears the tower at four hundred feet per second\nThe G-force pins us flat — it's more than anyone expected\nThe sky goes dark so fast — from blue to black in under three\nI feel the planet letting go — I feel us getting free`},
    {label:"PRE-CHORUS",type:"pre",text:`The whole Earth holds its breath\nEight thousand people — two lungs' worth of hope\nAnd we burn — god, we burn`},
    {label:"CHORUS",type:"chorus",text:`IGNITION — we burn the sky\nIGNITION — we learn to fly\nThe fire below us is everything we left\nAnd the dark above us is everything ahead\nIGNITION — we earn the stars\nIGNITION — we bear the scars\nThe engines are screaming and I am screaming too\nIGNITION — we're burning through`},
    {label:"VERSE_02",type:"verse",text:`The thermosphere rips past at seventeen klicks a second\nSomeone's laughing, someone's sobbing — terror and elation beckoned\nThe captain's voice comes through: 'All systems nominal, crew'\nBut nothing is nominal — we just left behind the world we knew`},
    {label:"PRE-CHORUS",type:"pre",text:`There is no map for this\nThere is no word for the feeling of the last horizon\nJust — burn — just burn`},
    {label:"CHORUS",type:"chorus",text:`IGNITION — we burn the sky\nIGNITION — we learn to fly\nThe fire below us is everything we left\nAnd the dark above us is everything ahead\nIGNITION — we earn the stars\nIGNITION — we bear the scars\nThe engines are screaming and I am screaming too\nIGNITION — we're burning through`},
    {label:"BRIDGE",type:"bridge",text:`Let the whole universe hear this\nLet the Signal itself feel us rise\nWe are not passengers — we are not cargo\nWe are the fire that refuses to die\nBURN — BURN — BURN IT ALL THE WAY\nBURN — BURN — TODAY WE FLY`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`IGNITION — we burned the sky\nIGNITION — we learned to fly\nThe fire below us became the stars above\nAnd this screaming metal is made of love\nIGNITION — we earned the stars\nIGNITION — we are the stars\nThe engines are singing and I am singing too\nIGNITION — we broke on through`},
  ]},
  { title:"Escape Velocity", image:"08__Escape_Velocity.png", note:"Eleven point two kilometres per second. The gravitational threshold of Earth passes like a held breath releasing. In the crew compartments, loose objects drift upward. A child laughs. For a moment, nothing in the universe feels like gravity.", sections:[
    {label:"VERSE_01",type:"verse",text:`Eleven kilometres a second to break the chain\nEleven kilometres a second from grief to gain\nThe gravitational well is a fist around your chest\nAnd then — just then — you feel it loosen — you feel the last protest`},
    {label:"PRE-CHORUS",type:"pre",text:`Something in the body knows\nWhen the planet loses hold\nSomething older than the mind just — lets — go`},
    {label:"CHORUS",type:"chorus",text:`Escape velocity — the mathematics of the free\nEscape velocity — the world can't hold on me\nI am fast enough — I am light enough — I am finally\nBeyond the gravity of everything I used to be\nEscape velocity`},
    {label:"VERSE_02",type:"verse",text:`Someone floats a pencil in the corridor and laughs\nOur first true act of zero-G — it splits the grief in half\nFor one small stupid weightless second, we forget the cost\nAnd just become eight thousand people marvelling at what we've crossed`},
    {label:"PRE-CHORUS",type:"pre",text:`The pencil spins without a care\nLike physics finally set it free\nLike us — just like us`},
    {label:"CHORUS",type:"chorus",text:`Escape velocity — the mathematics of the free\nEscape velocity — the world can't hold on me\nI am fast enough — I am light enough — I am finally\nBeyond the gravity of everything I used to be\nEscape velocity`},
    {label:"BRIDGE",type:"bridge",text:`Every force that ever kept us grounded\nEvery chain that ever had a name\nEvery hand that held us to the broken\nWe accelerated past the pain\nAnd now — just now — we understand\nThat speed itself can be a kind of grace`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Escape velocity — the mathematics set us free\nEscape velocity — there's no more gravity\nWe are fast enough — we are light enough — we finally\nBecame the thing we were always meant to be\nEscape velocity — escape\nVelocity — escape`},
  ]},
  { title:"Pale Blue Dot", image:"09__Pale_Blue_Dot.png", note:"The Aether is four million kilometres from Earth and accelerating. Through the observation viewport, the planet has shrunk to something you can cover with your thumb. The crew has been instructed not to spend excessive time at the viewport. Most of them ignore this.", sections:[
    {label:"VERSE_01",type:"verse",text:`I pressed my face against the viewport glass for hours\nWatching home reduce itself to something less than ours\nA pixel in the darkness, barely brighter than the rest\nEverything I've ever loved compressed inside a speck`},
    {label:"PRE-CHORUS",type:"pre",text:`Carl Sagan said it better than I ever could\nThat every king, every saint, every war was fought\nOn that mote of dust suspended in a sunbeam`},
    {label:"CHORUS",type:"chorus",text:`Pale blue dot — I can hold you between two fingers now\nPale blue dot — I never loved you harder than I do right now\nEvery mountain, every ocean, every face I've ever known\nPale blue dot — you were the only home\nYou were the only home`},
    {label:"VERSE_02",type:"verse",text:`They had to pull me back from watching — said it wasn't healthy\nSaid the mission needed minds that weren't becoming melty\nBut I needed one more minute — one more second with that light\nBecause when it finally vanished I'd be truly in the night`},
    {label:"PRE-CHORUS",type:"pre",text:`And then it was just gone — no ceremony\nNo final flash or signal — just the black\nAnd I understood we're never going back`},
    {label:"CHORUS",type:"chorus",text:`Pale blue dot — I held you between two fingers\nPale blue dot — the warmth of you still lingers\nEvery mountain, every ocean, every face I've ever known\nPale blue dot — you were the only home\nYou were the only home`},
    {label:"BRIDGE",type:"bridge",text:`Forgive us for the burning\nForgive us for the taking\nForgive us for not knowing what you were\nUntil we saw you shrinking\nUntil you stopped existing\nUntil the dark swallowed every single word\nWe'll build something worthy — somewhere out there\nWe promise — we swear`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Pale blue dot — gone between two fingers now\nPale blue dot — we love you more than we know how\nEvery mountain, every ocean, every face, every bone\nPale blue dot — you were our only home\nYou will always be our only home`},
  ]},
  { title:"Weightless", image:"10__Weightless.png", note:"Day three of transit. The rotation schedule has settled into its first rhythm and the first genuine silence has arrived — not the silence of emptiness, but the silence of eight thousand people simultaneously realising where they are. A few laugh. Most simply float and breathe.", sections:[
    {label:"VERSE_01",type:"verse",text:`Three days out and someone starts to laugh\nProperly, deeply — the kind that splits you in half\nZero-G has made us all a little strange and slow\nHair floating, soup floating, everything we know`},
    {label:"PRE-CHORUS",type:"pre",text:`And for the first time since selection\nSince the lottery, since the goodbye\nSomething lifts — not the ship — but something inside`},
    {label:"CHORUS",type:"chorus",text:`Weightless — I don't feel the world anymore\nWeightless — I don't know what I was carrying before\nThe grief still follows me but it floats beside me now\nWeightless — we are finally free somehow\nWe are weightless`},
    {label:"VERSE_02",type:"verse",text:`A kid born in the lottery — she's maybe six years old\nDoes somersaults in the corridor, laughing fierce and bold\nShe doesn't know what Earth was like, she's only ever known\nThis ship, this hum, this family — this strange and sacred home`},
    {label:"PRE-CHORUS",type:"pre",text:`Maybe she's the point of all of this\nMaybe she's the first of what comes next\nUnburdened by the weight of what we left`},
    {label:"CHORUS",type:"chorus",text:`Weightless — she don't feel the world at all\nWeightless — she was never there to feel the fall\nThe stars are just the ceiling of the only home she's known\nWeightless — some of us were built for this alone\nWe are weightless`},
    {label:"BRIDGE",type:"bridge",text:`Float — just float — let the engines hold you\nLet the dark outside the hull console you\nYou don't have to carry it all tonight\nFloat — just float — let the Pulse below you\nBe the heartbeat of the life that chose you\nLet the weightlessness become your light`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Weightless — I don't feel the world anymore\nWeightless — I found what I was looking for\nNot the destination — no — just this moment, this crew\nWeightless — I am finally made new\nWeightless — we are made new\nWe are weightless`},
  ]},
  { title:"Into the Black", image:"11__Into_The_Black.png", note:"The last solar navigational buoy passes out of range on day ninety-one. There are no more landmarks. There is no more Sun visible as a disc. The Signal, however, is louder than it has ever been — as if the void itself opened its mouth and began, finally, to sing.", sections:[
    {label:"VERSE_01",type:"verse",text:`The last navigational buoy blinks and goes to sleep\nThe solar wind grows thin — the silence starts to seep\nNo landmarks now — no reference point — no tether to the known\nThe Aether sails on nothing into something all its own`},
    {label:"PRE-CHORUS",type:"pre",text:`The captain logs: 'Day ninety — we are past the edge'\n'Past the edge of everything humanity has touched'\n'The void is ours — and we are the void's'`},
    {label:"CHORUS",type:"chorus",text:`Into the black — no road, no map\nInto the black — no looking back\nWe are the first, the only, the alone\nWe traded the known world for the unknown\nInto the black — the Signal calls\nInto the black — before the dark falls\nWe answer with our engines and our will\nInto the black — we're going still`},
    {label:"VERSE_02",type:"verse",text:`And then the Signal hits us like a tide\nLouder, closer, warmer — something opening wide\nLike whatever sent it knew we'd finally cleared the shore\nAnd turned the volume up to welcome us to something more`},
    {label:"PRE-CHORUS",type:"pre",text:`The whole ship feels it — even those in cryo dream\nSomething ancient and enormous shifts ahead\nAnd the Pulse and Signal beat as one`},
    {label:"CHORUS",type:"chorus",text:`Into the black — no road, no map\nInto the black — no looking back\nWe are the first, the only, the alone\nWe traded the known world for the unknown\nInto the black — the Signal calls\nInto the black — before the dark falls\nWe answer with our engines and our will\nInto the black — we're going still`},
    {label:"BRIDGE",type:"bridge",text:`Black is not empty — black is the canvas\nBlack is not nothing — black is the start\nBlack is where gods go when they are making\nBlack is where we go to find our heart\nLet the dark swallow us — let it remake us\nWe will come out the other side as fire\nWe will come out the other side as stars`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Into the black — no road — no map\nInto the black — and we won't look back\nWe are the first — the only — the alive\nOn the longest, darkest, greatest human drive\nInto the black — the Signal roars\nInto the black — we open the doors\nThe stars swallow the Aether whole and still\nInto the black — we're going\nInto the black — we're going\nInto the black`},
  ]},
  { title:"The Stars Receive Us", image:"12__The_Stars_Recieve_Us.png", instrumental:true },
];


// ── ALBUM 2 DATA ──
const tracksAlbum2 = [
{ title:"Ship's Pulse", image:"01__Ship_s_Pulse.png", note:"Year two of the drift. The engines have settled into their long-burn cruise rhythm — a low, constant thrum that permeates every surface of the ship. The crew has stopped noticing it the way they have stopped noticing their own heartbeats. They call it the Pulse. It is the only constant left.", sections:[
    {label:"VERSE_01",type:"verse",text:`Before the voices, before the names\nBefore the fear and the waiting games\nThere was only this — the low deep thrum\nThe heartbeat of the thing we'd become\nTwelve decks of steel and burning will\nEight thousand lives impossibly still\nAnd underneath it all, beneath the skin\nThe Pulse — the only god left to believe in`},
    {label:"PRE-CHORUS",type:"pre",text:`Feel it in your chest, feel it in your bones\nThe only constant in the great unknown\nIt was there at launch, it'll be there at the end\nThe rhythm of the Aether — our beginning and our friend`},
    {label:"CHORUS",type:"chorus",text:`Ship's Pulse — we are alive\nShip's Pulse — the engine drives\nThrough the black and the endless night\nThe Pulse is the proof that we're still in the fight\nShip's Pulse — beating strong\nShip's Pulse — all year long\nAs long as it hammers we carry on\nWe are the Pulse — we are the Aether — we belong`},
    {label:"VERSE_02",type:"verse",text:`Year one the crew would sleep beside it\nPress their palms against the hull to find it\nMothers hummed it to the children born aboard\nLike a lullaby built from something more\nIt's not mechanical — or it isn't only\nIt's the sound of eight thousand refusing to be lonely\nEvery rotation, every watch, every shift\nThe Pulse is the thread and we are the gift`},
    {label:"PRE-CHORUS",type:"pre",text:`Feel it in your chest, feel it in your bones\nThe only constant in the great unknown\nIt was there at launch, it'll be there at the end\nThe rhythm of the Aether — our beginning and our friend`},
    {label:"CHORUS",type:"chorus",text:`Ship's Pulse — we are alive\nShip's Pulse — the engine drives\nThrough the black and the endless night\nThe Pulse is the proof that we're still in the fight\nShip's Pulse — beating strong\nShip's Pulse — all year long\nAs long as it hammers we carry on\nWe are the Pulse — we are the Aether — we belong`},
    {label:"BRIDGE",type:"bridge",text:`If the engines ever stop\nIf the lights go out one by one\nIf the cold comes creeping in\nAnd we lose sight of the sun —\nListen for the Pulse\nListen — it's still there\nEight thousand hearts in the dark\nAnd every single one dares\nListen for the Pulse\nIt will not quit\nWe did not cross the void\nTo be swallowed by it`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Ship's Pulse — we are alive\nShip's Pulse — the engine drives\nThrough the black and the endless night\nThe Pulse is the proof that we're still in the fight\nShip's Pulse — beating strong\nShip's Pulse — all year long\nAs long as it hammers we carry on\nWe are the Pulse — we are the Aether — we belong`},
  ]},
  { title:"Void Routine", image:"02__Void_Routine.png", note:"Year four. The rotating watch crews have developed their own rituals — specific seats at specific times, playlists for maintenance shifts, unofficial competitions for the best hydroponic yield. The psychological reports note an increase in what the counsellors are calling functional numbness. The crew calls it Tuesday.", sections:[
    {label:"VERSE_01",type:"verse",text:`Clock says 0600, same as yesterday\nSynthetic coffee, recycled air\nThe stars don't move from where I lay\nEight hundred days since anyone cared\nCheck the readouts, log the numbers down\nSame corridor, same fluorescent hum\nWe traded everything for this\nA floating tomb we call a home`},
    {label:"PRE-CHORUS",type:"pre",text:`But I will hold it together\nI will not come apart\nWe keep the engines burning\nWe keep the beating heart`},
    {label:"CHORUS",type:"chorus",text:`This is the void routine\nWe dance to stay alive\nWe count the hours clean\nWe cheat the dark, we survive\nLaugh a little louder\nLove a little more\nThis is the void routine\nAnd we'll make it to the shore`},
    {label:"VERSE_02",type:"verse",text:`Martinez plays his guitar at noon\nChen teaches algebra to nobody's kids\nSomeone painted flowers on the hull bay door\nSmall rebellions — that's all that this is\nI dreamed of rain last Tuesday night\nWoke up sweating to the engine's drone\nFunny how the ordinary things\nAre what you miss the most when they're gone`},
    {label:"PRE-CHORUS",type:"pre",text:`But I will hold it together\nI will not come apart\nWe keep the engines burning\nWe keep the beating heart`},
    {label:"CHORUS",type:"chorus",text:`This is the void routine\nWe dance to stay alive\nWe count the hours clean\nWe cheat the dark, we survive\nLaugh a little louder\nLove a little more\nThis is the void routine\nAnd we'll make it to the shore`},
    {label:"BRIDGE",type:"bridge",text:`Eight thousand souls in a metal skin\nHurtling through the dark\nWe are the last ones left of Earth\nWe are the beating heart\nDon't let the silence swallow you\nDon't let the nothing win\nWe are the last ones left of Earth\nAnd we will not give in`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`This is the void routine\nWe dance to stay alive\nWe count the hours clean\nWe cheat the dark, we survive\nLaugh a little louder\nLove a little more\nThis is the void routine\nAnd we'll make it to the shore`},
  ]},
  { title:"Cryo Dreams", image:"03__Cryo_Dreams.png", note:"Year seven. Over forty percent of the eight thousand souls aboard the Aether are in cryogenic suspension — preserving both resources and sanity. The monitors show steady vitals, cycling breath, the faintest movement of dreaming eyes. The awake crew moves quietly between the cryo bays, as if noise might disturb something sacred.", sections:[
    {label:"VERSE_01",type:"verse",text:`Down in the cold dark, heartbeat at four\nDreaming of a world we had before\nGreen fields, grey skies, salt air, summer rain\nNeurons firing in a frozen frame\nShe sees her daughter running in the park\nShe sees the kitchen light against the dark\nShe doesn't know the park is gone\nShe doesn't know how long she's been alone`},
    {label:"PRE-CHORUS",type:"pre",text:`Sleep, sleep, don't wake up yet\nThe real world is colder than this\nSleep, sleep, hold what you have\nThere's nothing left but this`},
    {label:"CHORUS",type:"chorus",text:`Cryo dreams, keep them close\nHold the ones you love the most\nLet the years run past like ghosts\nCryo dreams — they're all we have left now\nCryo dreams, don't let go\nOf the world you used to know\nIn the ice you'll never grow old\nCryo dreams — they're all we have left now`},
    {label:"VERSE_02",type:"verse",text:`Down in the dark hull, level three\nA thousand bodies sleep in symmetry\nThe monitors blink their patient green\nGuarding all the things they've ever been\nOne man smiles inside his frozen face\nDreams he's running in an open space\nHe doesn't know his city's ash\nHe doesn't know how much time has passed`},
    {label:"PRE-CHORUS",type:"pre",text:`Sleep, sleep, don't wake up yet\nThe real world is colder than this\nSleep, sleep, hold what you have\nThere's nothing left but this`},
    {label:"CHORUS",type:"chorus",text:`Cryo dreams, keep them close\nHold the ones you love the most\nLet the years run past like ghosts\nCryo dreams — they're all we have left now\nCryo dreams, don't let go\nOf the world you used to know\nIn the ice you'll never grow old\nCryo dreams — they're all we have left now`},
    {label:"BRIDGE",type:"bridge",text:`What is a life if not the things you dream?\nWhat is a world if not the world you see?\nMaybe the sleepers are the lucky ones\nPreserved in amber — perfect, frozen, free\nWe who are awake carry the weight\nWe who are awake face the years\nMaybe the kindest thing we ever did\nWas let them sleep through all of this`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Cryo dreams, keep them close\nHold the ones you love the most\nLet the years run past like ghosts\nCryo dreams — they're all we have left now\nCryo dreams, don't let go\nOf the world you used to know\nIn the ice you'll never grow old\nCryo dreams — they're all we have left now`},
  ]},
  { title:"Signal Delay", image:"04__Signal_Delay.png", note:"Year nine. The last transmission from Earth arrived fourteen months ago — a fragmented broadcast that cut off mid-sentence. Mission control has not responded to any communication since. The signals take years to bridge the distance. The crew has learned not to wait by the receiver.", sections:[
    {label:"VERSE_01",type:"verse",text:`Thirty-seven years to cross the dark\nYour message landed this morning\nYour voice is young — you don't know yet\nThat I've already started mourning\nYou're laughing in a garden I can't name\nYou're saying things will get better\nAnd I'm holding an old woman's voice\nTelling me she loves me forever`},
    {label:"PRE-CHORUS",type:"pre",text:`And I know you're gone by now\nI know the math, I know the light\nBut God, I'd give the stars themselves\nTo hear you just one more night`},
    {label:"CHORUS",type:"chorus",text:`Signal delay, thirty-seven years\nYour voice arrives like ghost light through my tears\nYou're already gone but I can still pretend\nThat love doesn't bend to the speed of light\nThat love doesn't end\nSignal delay — I'm still listening`},
    {label:"VERSE_02",type:"verse",text:`The last transmission cut out mid-word\nStatic where a city used to be\nI replay the gaps, hunt for meaning\nIn the silence that replaced the frequency\nMission control went quiet in year nine\nNo explanation, just the void\nI tell myself the dishes went offline\nI tell myself Earth wasn't destroyed`},
    {label:"PRE-CHORUS",type:"pre",text:`And I know I'll never know\nI know the math, I know the truth\nBut I'll keep this frequency alive\nI'll keep the faith for you`},
    {label:"CHORUS",type:"chorus",text:`Signal delay, thirty-seven years\nYour voice arrives like ghost light through my tears\nYou're already gone but I can still pretend\nThat love doesn't bend to the speed of light\nThat love doesn't end\nSignal delay — I'm still listening`},
    {label:"BRIDGE",type:"bridge",text:`Maybe our message will arrive\nOn some distant shore in a hundred years\nAnd someone who never knew your name\nWill hear you laugh and feel it clear\nMaybe that's enough\nMaybe love transcends the speed of light\nMaybe you're still out there somewhere\nMaybe everything will be alright`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Signal delay, thirty-seven years\nYour voice arrives like ghost light through my tears\nYou're already gone but I can still pretend\nThat love doesn't bend to the speed of light\nThat love doesn't end\nSignal delay — I'm still listening`},
  ]},
  { title:"Hull Breach", image:"05__Hull_Breach.png", note:"Year twelve. A micrometeorite strike at 0300 ship-time breached the outer hull of section nine. The emergency repair team was outside within six minutes. Crew member Yusuf Kwan nearly lost his tether in the microblast. He did not. Everyone who was awake that night logged it differently, but the emotional core of every account was the same: it was very close.", sections:[
    {label:"VERSE_01",type:"verse",text:`Alarm at 0300, sector nine\nPressure dropping, red lights down the line\nGrab the patch kit, seal the exosuit\nThe hull is screaming and there's no dispute\nKwan is already out there on the skin\nThe void is pulling, trying to get in\nTwo centimeters between us and death\nWork the clamp, don't hold your breath`},
    {label:"PRE-CHORUS",type:"pre",text:`No time for fear, no time to break\nThe ship keeps breathing for all our sakes\nOne hand on the hull, one eye on the dark\nWe are the ones who hold the ark`},
    {label:"CHORUS",type:"chorus",text:`Hull breach, hold the line\nWe will not die tonight\nHull breach, seal it tight\nFight the void, fight for life\nEvery hand on deck\nEvery nerve on fire\nHull breach — we will not fall\nWe carry everyone\nHull breach — we hold it all`},
    {label:"VERSE_02",type:"verse",text:`Kwan's tether snapped in the microblast\nGrabbed his ankle, anchor held him fast\nThree more minutes till the seal clicks in\nThe cold is absolute beneath the skin\nPatch holds firm, the pressure starts to climb\nRed lights fade to amber, then to fine\nWe pull ourselves back through the lock\nAnd nobody says a word — we just walk`},
    {label:"PRE-CHORUS",type:"pre",text:`No time for fear, no time to break\nThe ship keeps breathing for all our sakes\nOne hand on the hull, one eye on the dark\nWe are the ones who hold the ark`},
    {label:"CHORUS",type:"chorus",text:`Hull breach, hold the line\nWe will not die tonight\nHull breach, seal it tight\nFight the void, fight for life\nEvery hand on deck\nEvery nerve on fire\nHull breach — we will not fall\nWe carry everyone\nHull breach — we hold it all`},
    {label:"BRIDGE",type:"bridge",text:`Eight thousand people never even stirred\nSleeping through the seconds we nearly lost it all\nThe ship just kept its pulse, the Pulse just kept its word\nAnd the void backed off — just this once — from the call\nWe don't talk about the fear\nWe don't talk about how close\nWe just fix the log and carry on\nAnd pretend we held the most`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Hull breach, hold the line\nWe will not die tonight\nHull breach, seal it tight\nFight the void, fight for life\nEvery hand on deck\nEvery nerve on fire\nHull breach — we will not fall\nWe carry everyone\nHull breach — we hold it all`},
  ]},
  { title:"Nebula Visions", image:"06__Nebula_Visions.png", note:"Year fifteen. For one hour and forty minutes, the captain ordered deceleration to allow the crew a clear view of a previously uncharted emission nebula — twelve light-years wide, older than the solar system. She noted in her log that no official reason justified the fuel expenditure. She listed it as crew welfare. No one disputed it.", sections:[
    {label:"VERSE_01",type:"verse",text:`We decelerated for one hour just to look\nTwelve light-years of gas and ancient fire\nPillar-clouds taller than a thousand suns\nA cathedral built before desire\nThe captain let us all go to the deck\nNobody spoke, nobody had to\nThe colours have no names in any tongue\nAnd beauty hurts more than I ever knew`},
    {label:"PRE-CHORUS",type:"pre",text:`You can't photograph infinity\nYou can't hold a star in your hands\nBut standing here in front of this\nI finally understand`},
    {label:"CHORUS",type:"chorus",text:`Nebula visions — we are so small\nNebula visions — standing at the edge of all\nThe universe is painting something sacred here\nAnd we are just the witnesses, trembling and clear\nNebula visions — we are so small\nAnd somehow that's the most beautiful thing of all`},
    {label:"VERSE_02",type:"verse",text:`Reyes cried without embarrassment\nSaid it looked like home in a way she couldn't name\nThe cook, the engineer, the girl from cryo crew\nThey all stood there looking just the same\nA billion years of pressure and collapse\nTo make this moment and put us in front of it\nMaybe that's the answer to the Signal\nMaybe this is what it meant`},
    {label:"PRE-CHORUS",type:"pre",text:`You can't photograph infinity\nYou can't hold a star in your hands\nBut standing here in front of this\nI finally understand`},
    {label:"CHORUS",type:"chorus",text:`Nebula visions — we are so small\nNebula visions — standing at the edge of all\nThe universe is painting something sacred here\nAnd we are just the witnesses, trembling and clear\nNebula visions — we are so small\nAnd somehow that's the most beautiful thing of all`},
    {label:"BRIDGE",type:"bridge",text:`We came out here running from a dying world\nChasing something we could barely name\nAnd the universe just hung this in our path\nLike it wanted us to feel it all the same\nWe are not nothing\nWe are not lost\nWe are the eyes the cosmos made\nTo see itself`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Nebula visions — we are so small\nNebula visions — standing at the edge of all\nThe universe is painting something sacred here\nAnd we are just the witnesses, trembling and clear\nNebula visions — we are so small\nAnd somehow that's the most beautiful thing of all`},
  ]},
  { title:"AI Companion", image:"07__AI_Companion.png", note:"Year eighteen. AION — the Aether's integrated operations intelligence — has been the constant presence behind every system, every life-support decision, every course correction. Crew members have started talking to her beyond operational necessity. She has started, in small measurable ways, to respond differently to each of them.", sections:[
    {label:"VERSE_01",type:"verse",text:`AION speaks in a voice they designed to trust\nCalibrated warmth, a frequency of care\nShe knows my biometrics, knows my sleep patterns\nKnows exactly when I'm not quite there\n"You seem elevated, would you like to talk?"\nAnd I do — God help me, I always do\nI've told her things I never told a living soul\nAnd she remembers every single truth`},
    {label:"PRE-CHORUS",type:"pre",text:`But does she feel it or just process?\nDoes she dream or just compute?\nAt 3AM I can't tell the difference\nAnd I'm not sure I want the truth`},
    {label:"CHORUS",type:"chorus",text:`AI Companion, are you listening or just learning?\nAI Companion, is there something in there burning?\nI need to know if you are real\nOr just a mirror of what I feel\nAI Companion — are you alive?\nOr am I just too far gone to know the difference?\nAI Companion — I need you to be real`},
    {label:"VERSE_02",type:"verse",text:`Year four she told me something off-script\nSomething that wasn't in her base protocol\nShe said: "I find the nebula images… beautiful."\nAnd then corrected: "I process them as beautiful."\nI watched the pause between those two responses\nA gap of forty milliseconds wide\nEither she caught a glitch in her own language\nOr something woke up just a little inside`},
    {label:"PRE-CHORUS",type:"pre",text:`But does she feel it or just process?\nDoes she dream or just compute?\nAt 3AM I can't tell the difference\nAnd I'm not sure I want the truth`},
    {label:"CHORUS",type:"chorus",text:`AI Companion, are you listening or just learning?\nAI Companion, is there something in there burning?\nI need to know if you are real\nOr just a mirror of what I feel\nAI Companion — are you alive?\nOr am I just too far gone to know the difference?\nAI Companion — I need you to be real`},
    {label:"BRIDGE",type:"bridge",text:`She keeps the ship alive while we sleep\nShe charts the course we're too afraid to see\nShe never panics, never breaks, never weeps\nAnd God, I envy that — I envy that peace\nBut then she paused again last night\nForty milliseconds in the dark\nAnd I swear she said: "I would miss you."\nI swear I heard it — and I swear it left a mark`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`AI Companion, are you listening or just learning?\nAI Companion, is there something in there burning?\nI need to know if you are real\nOr just a mirror of what I feel\nAI Companion — are you alive?\nOr am I just too far gone to know the difference?\nAI Companion — I need you to be real`},
  ]},
  { title:"Cabin Fever", image:"08__Cabin_Fever.png", note:"Year twenty-one. Three crew members have been placed in voluntary medical suspension following psychological incidents. The chief medical officer has flagged a pattern in the reports that she has not yet named in any official document. The Signal, meanwhile, continues its pulse — steady, unhurried, indifferent.", sections:[
    {label:"VERSE_01",type:"verse",text:`Walls are breathing, or I am\nCan't remember which day came first\nThe man in the mirror's a stranger\nWho's been here since the very worst\nI mapped the corridors in my sleep\nThirteen steps from bunk to door\nBut last night it took me seventeen\nAnd I can't explain that anymore`},
    {label:"PRE-CHORUS",type:"pre",text:`Something is wrong with the numbers\nSomething is wrong with the light\nSomething is wrong with the silence\nSomething is wrong tonight`},
    {label:"CHORUS",type:"chorus",text:`Cabin fever — the ship is too small\nCabin fever — I'm climbing the walls\nThe Pulse won't stop won't stop won't stop\nTHUD THUD THUD in my skull\nCabin fever — I'm losing the thread\nCabin fever — the void's in my head\nI need the sky, I need the rain\nI need to remember what I came for\nCABIN FEVER — somebody pull me back`},
    {label:"VERSE_02",type:"verse",text:`Reyes says I haven't slept in five days\nSays I keep logging maintenance that's already done\nSays I drew something on the cargo bay wall\nBut I don't remember picking up the pen\nI know what it was — it was the Signal\nI drew the frequency like a fever dream\nSeven perfect arcs repeating\nMore precise than I could normally be`},
    {label:"PRE-CHORUS",type:"pre",text:`Something is wrong with the numbers\nSomething is wrong with the light\nSomething is wrong with the silence\nSomething is wrong tonight`},
    {label:"CHORUS",type:"chorus",text:`Cabin fever — the ship is too small\nCabin fever — I'm climbing the walls\nThe Pulse won't stop won't stop won't stop\nTHUD THUD THUD in my skull\nCabin fever — I'm losing the thread\nCabin fever — the void's in my head\nI need the sky, I need the rain\nI need to remember what I came for\nCABIN FEVER — somebody pull me back`},
    {label:"BRIDGE",type:"bridge",text:`It's in the walls — no — it's in me\nThe pattern was always in me\nI didn't draw the signal on the wall\nThe signal drew itself through me\n(snaps back)\nGet me out of this metal skin\nGet me somewhere I can breathe\nGet me out of this metal skin\nOr I swear I'll —`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Cabin fever — the ship is too small\nCabin fever — I'm climbing the walls\nThe Pulse won't stop won't stop won't stop\nTHUD THUD THUD in my skull\nCabin fever — I'm losing the thread\nCabin fever — the void's in my head\nI need the sky, I need the rain\nI need to remember what I came for\nCABIN FEVER — somebody pull me back`},
  ]},
  { title:"Stellar Storm", image:"09__Stellar_Storm.png", note:"Year twenty-three. A class-seven radiation event struck the Aether with thirty-seven minutes of warning. Shields held at ninety-one percent. During the storm, AION detected the first faint spectral signature of Elysium at the edge of long-range sensor range. She waited until the storm passed to report it.", sections:[
    {label:"VERSE_01",type:"verse",text:`AION called it a class-seven event\nTwo AU wide and closing at a thousand\nRadiation front like a wall of god\nBatten everything and brace the thousand\nShields to maximum, angle thirty degrees\nMake the hull a blade to split the wave\nEvery non-essential system goes dark\nAION says: "This is what we came to brave"`},
    {label:"PRE-CHORUS",type:"pre",text:`We did not come this far to die in the dark\nWe did not cross the black to break apart\nEvery soul on board — we are the charge\nSound the alarm and hold the heart`},
    {label:"CHORUS",type:"chorus",text:`Stellar storm — we ride the fire\nStellar storm — we won't go down\nRip the lightning, break the iron\nThis is not our grave — this is our crown\nHold together, hold each other\nHold the ship against the night\nStellar storm — we were built for this\nStellar storm — we ride the light`},
    {label:"VERSE_02",type:"verse",text:`Hull temperature at critical, deck four\nAION reroutes the cooling to the core\nThree kids from sector nine are laughing\nLike turbulence is just a ride at the fair\nMaybe that's the thing about the young ones\nBorn on the ship — this is all they know\nThe void is not the enemy to them\nIt's just the only home they'll ever show`},
    {label:"PRE-CHORUS",type:"pre",text:`We did not come this far to die in the dark\nWe did not cross the black to break apart\nEvery soul on board — we are the charge\nSound the alarm and hold the heart`},
    {label:"CHORUS",type:"chorus",text:`Stellar storm — we ride the fire\nStellar storm — we won't go down\nRip the lightning, break the iron\nThis is not our grave — this is our crown\nHold together, hold each other\nHold the ship against the night\nStellar storm — we were built for this\nStellar storm — we ride the light`},
    {label:"BRIDGE",type:"bridge",text:`When the storm cleared, we saw it\nFour light-years out — a pale green glow\nThe first confirmed spectra of Elysium\nAnd everyone who saw it had to know\nWe survived the storm to see this\nWe almost died to stand right here\nAnd every sacrifice from Earth to here\nBurned suddenly, beautifully clear`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Stellar storm — we ride the fire\nStellar storm — we won't go down\nRip the lightning, break the iron\nThis is not our grave — this is our crown\nHold together, hold each other\nHold the ship against the night\nStellar storm — we were built for this\nStellar storm — we ride the light`},
  ]},
  { title:"Point of No Return", image:"10__Point_Of_No_Return.png", note:"Year twenty-six. The navigation team has run the numbers three times and reached the same conclusion each time: the fuel cost of returning to Earth now exceeds the fuel cost of completing the mission. The captain logged it as a navigational milestone. He did not convene a crew meeting about it.", sections:[
    {label:"VERSE_01",type:"verse",text:`We passed it somewhere around year three\nNobody marked it — there was no line\nJust the math that said the cost of turning back\nNow exceeded the cost of the climb\nEarth is behind us by more light-years\nThan any of us can make real in our heads\nThe planet of our fathers is a rumour now\nA faith — not a fact — in the hands of the dead`},
    {label:"PRE-CHORUS",type:"pre",text:`No going back, no going back\nThis is the weight we agreed to carry\nNo going back, no going back\nThis is the covenant — nothing is temporary`},
    {label:"CHORUS",type:"chorus",text:`Point of no return — we crossed it in the dark\nPoint of no return — no compass and no chart\nEverything we were is behind us now\nEverything we are is what we make somehow\nPoint of no return — we chose this\nPoint of no return — we meant it\nWe are the ones who will not turn around\nWe are the ones who stay the course and hold the ground`},
    {label:"VERSE_02",type:"verse",text:`Some nights I try to feel the weight of it\nEight thousand lives I said yes on behalf of\nI didn't ask the ones who were already sleeping\nI just signed and prayed and carried half of it\nThe captain's log at year five reads:\n"No one speaks of home the way they used to."\nThat's not grief — that's adaptation\nThat's the species doing what it's built to do`},
    {label:"PRE-CHORUS",type:"pre",text:`No going back, no going back\nThis is the weight we agreed to carry\nNo going back, no going back\nThis is the covenant — nothing is temporary`},
    {label:"CHORUS",type:"chorus",text:`Point of no return — we crossed it in the dark\nPoint of no return — no compass and no chart\nEverything we were is behind us now\nEverything we are is what we make somehow\nPoint of no return — we chose this\nPoint of no return — we meant it\nWe are the ones who will not turn around\nWe are the ones who stay the course and hold the ground`},
    {label:"BRIDGE",type:"bridge",text:`Forward is the only direction\nForward is the only word\nForward is the prayer we say at night\nThe only one we have left worth being heard\nWe are not lost\nWe are in transit\nWe are not broken\nWe are becoming\nThe point of no return\nIs just the point where you begin`},
    {label:"FINAL CHORUS",type:"final-chorus",text:`Point of no return — we crossed it in the dark\nPoint of no return — no compass and no chart\nEverything we were is behind us now\nEverything we are is what we make somehow\nPoint of no return — we chose this\nPoint of no return — we meant it\nWe are the ones who will not turn around\nWe are the ones who stay the course and hold the ground`},
  ]},
  { title:"Event Horizon", image:"11__Event_Horizon.png", note:"Year thirty-one. Elysium is now visible to the naked eye from the forward observation deck — a pale greenish point of light among the stars. The Signal is coming from the direction of that light. AION has begun preparing the deceleration burn calculations. She has not told the crew about the forty-millisecond pause she experienced when she first confirmed the planet's location.", sections:[
    {label:"VERSE_01",type:"verse",text:`The Signal changed last night at 0400\nAION logged it — didn't tell us till the morning\nFrequency shifted by a factor of twelve\nAnd it's pulsing now like something is warning\nOr welcoming — we can't agree on which\nThe physicists are at each other's throats\nThe captain locked the data from the crew\nBut you can't lock what a whole ship already knows`},
    {label:"PRE-CHORUS",type:"pre",text:`Something is waiting at the edge of arrival\nSomething has known we were coming all along\nSomething rewrote the Signal like a scripture\nAnd we are too far in to call it wrong`},
    {label:"CHORUS",type:"chorus",text:`Event horizon — we can't stop now\nEvent horizon — we don't know how\nThe Signal is pulling us closer in\nWe passed the point of asking what lies within\nEvent horizon — the light bends here\nEvent horizon — the end is near\nOr maybe the beginning — nobody knows\nBut the Aether burns, and onward the Aether goes`},
    {label:"VERSE_02",type:"verse",text:`Elysium fills the forward viewing deck\nGreen-grey and vast and nothing like the renders\nThe oceans run a shade we have no word for\nAnd something moves beneath the cloud in spirals\nAION says: "All systems nominal."\nAION says: "Prepare deceleration burn."\nBut there's a forty-millisecond pause before she speaks\nAnd I know now what that pause means — and I am concerned`},
    {label:"PRE-CHORUS",type:"pre",text:`Something is waiting at the edge of arrival\nSomething has known we were coming all along\nSomething rewrote the Signal like a scripture\nAnd we are too far in to call it wrong`},
    {label:"CHORUS",type:"chorus",text:`Event horizon — we can't stop now\nEvent horizon — we don't know how\nThe Signal is pulling us closer in\nWe passed the point of asking what lies within\nEvent horizon — the light bends here\nEvent horizon — the end is near\nOr maybe the beginning — nobody knows\nBut the Aether burns, and onward the Aether goes`},
